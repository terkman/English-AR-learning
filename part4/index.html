<!DOCTYPE html>
<!-- Part 4: English Situation 3D - Three.js Object Click + Teach Mode -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Part 4 – English Situation 3D</title>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: var(--bg-dark);
      color: var(--text-white);
      touch-action: none;
    }

    .p4-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 8%, rgba(6,214,160,0.18), transparent 34%),
        radial-gradient(circle at 88% 88%, rgba(0,212,255,0.10), transparent 32%),
        #0a0e1a;
    }

    #viewer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(0.75rem + env(safe-area-inset-top)) 0.85rem 0.75rem;
      background: linear-gradient(180deg, rgba(10,14,26,0.96) 55%, rgba(10,14,26,0));
      pointer-events: none;
    }

    .top-bar > * {
      pointer-events: auto;
    }

    .back-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      border-radius: 999px;
      padding: 0.48rem 0.82rem;
      font-family: var(--font-main);
      font-weight: 900;
      font-size: 0.78rem;
    }

    .title-wrap {
      text-align: center;
      min-width: 0;
    }

    .title-main {
      color: var(--green);
      font-weight: 900;
      font-size: 0.95rem;
      line-height: 1.1;
    }

    .title-sub {
      color: var(--text-muted);
      font-weight: 800;
      letter-spacing: 1.6px;
      font-size: 0.58rem;
      text-transform: uppercase;
    }

    .teach-pill {
      background: rgba(6,214,160,0.14);
      border: 1px solid rgba(6,214,160,0.38);
      color: var(--green);
      border-radius: 999px;
      padding: 0.48rem 0.7rem;
      font-family: var(--font-main);
      font-size: 0.7rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .teach-pill.on {
      color: #06120e;
      background: var(--green);
      border-color: var(--green);
    }

    .tool-row {
      position: fixed;
      top: calc(4.05rem + env(safe-area-inset-top));
      left: 0.75rem;
      right: 0.75rem;
      z-index: 45;
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
      scrollbar-width: none;
      pointer-events: none;
    }

    .tool-row::-webkit-scrollbar {
      display: none;
    }

    .tool-row button,
    .tool-row label {
      pointer-events: auto;
      flex: 0 0 auto;
      background: rgba(18,24,43,0.82);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 0.48rem 0.72rem;
      font-family: var(--font-main);
      font-weight: 900;
      font-size: 0.7rem;
      backdrop-filter: blur(10px);
    }

    .tool-row button.active {
      color: #06120e;
      background: var(--green);
      border-color: var(--green);
    }

    #file-input {
      display: none;
    }

    .status-chip {
      position: fixed;
      top: calc(7rem + env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      z-index: 40;
      max-width: min(88vw, 420px);
      background: rgba(18,24,43,0.82);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      padding: 0.42rem 0.8rem;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 900;
      text-align: center;
      backdrop-filter: blur(10px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tap-hint {
      position: fixed;
      left: 50%;
      bottom: calc(6.6rem + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 25;
      width: min(92vw, 420px);
      text-align: center;
      color: rgba(255,255,255,0.56);
      font-size: 0.76rem;
      font-weight: 800;
      letter-spacing: 0.8px;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .tap-hint.hidden {
      opacity: 0;
    }

    .info-panel {
      position: fixed;
      left: 16px;
      top: 180px;
      width: min(360px, calc(100vw - 32px));
      max-height: min(46vh, 420px);
      overflow: auto;
      z-index: 70;
      background: rgba(18,24,43,0.94);
      border: 1px solid rgba(255,255,255,0.12);
      border-top: 2px solid var(--green);
      border-radius: 22px;
      padding: 1.05rem 1.05rem 1.15rem;
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
      transition:
        opacity 0.18s ease,
        transform 0.18s ease,
        left 0.08s linear,
        top 0.08s linear;
      box-shadow: 0 18px 54px rgba(0,0,0,0.42);
      backdrop-filter: blur(18px);
    }

    .info-panel.show {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
    }

    .panel-close {
      position: absolute;
      top: 0.68rem;
      right: 0.72rem;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 0.3rem 0.66rem;
      font-family: var(--font-main);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .panel-label {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 900;
      color: var(--green);
      letter-spacing: 0.2px;
      text-transform: none;
      margin-bottom: 0.5rem;
      padding: 0.24rem 0.64rem;
      padding-right: 0.64rem;
      background: rgba(6,214,160,0.14);
      border: 1px solid rgba(6,214,160,0.24);
      border-radius: 999px;
      max-width: calc(100% - 3.2rem);
    }

    .panel-word {
      color: var(--text-white);
      font-size: 1.9rem;
      font-weight: 900;
      line-height: 1.02;
      margin-bottom: 0.28rem;
      padding-right: 3.2rem;
      word-break: break-word;
    }

    .panel-phonetic {
      font-family: var(--font-mono);
      color: var(--text-muted);
      font-size: 0.82rem;
      font-weight: 800;
      margin-bottom: 0.55rem;
    }

    .panel-example {
      color: var(--text-muted);
      font-size: 0.86rem;
      line-height: 1.45;
      font-weight: 700;
      border-left: none;
      padding-left: 0;
      margin: 0.6rem 0 0.85rem;
    }

    .panel-buttons {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      margin-top: 0.85rem;
    }

    .btn {
      touch-action: manipulation;
    }

    .dialogue-box {
      display: grid;
      gap: 0.45rem;
      margin: 0.6rem 0 0.85rem;
    }

    .dialogue-line {
      display: grid;
      grid-template-columns: 1.3rem 1fr;
      gap: 0.45rem;
      align-items: start;
    }

    .dialogue-speaker {
      color: var(--green);
      font-family: var(--font-mono);
      font-weight: 900;
      font-size: 0.76rem;
    }

    .dialogue-text {
      color: var(--text-white);
      font-weight: 700;
      line-height: 1.38;
      font-size: 0.86rem;
    }

    .object-list {
      position: fixed;
      left: 0.75rem;
      right: 0.75rem;
      bottom: calc(0.85rem + env(safe-area-inset-bottom));
      z-index: 60;
      max-height: 42vh;
      overflow: auto;
      background: rgba(18,24,43,0.96);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 0.85rem;
      box-shadow: 0 16px 44px rgba(0,0,0,0.38);
      display: none;
    }

    .object-list.show {
      display: block;
    }

    .object-list-title {
      color: var(--green);
      font-weight: 900;
      margin-bottom: 0.55rem;
      font-size: 0.88rem;
    }

    .object-list-item {
      color: var(--text-muted);
      font-size: 0.72rem;
      font-family: var(--font-mono);
      font-weight: 700;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      overflow-wrap: anywhere;
    }

    .loading-cover {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0e1a;
      gap: 1rem;
      transition: opacity 0.35s;
      pointer-events: none;
    }

    .loading-cover.hidden {
      opacity: 0;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: var(--green);
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: var(--text-muted);
      font-weight: 900;
      font-size: 0.85rem;
    }

    @media (max-width: 420px) {
      .panel-word {
        font-size: 1.72rem;
      }

      .tool-row {
        top: calc(3.85rem + env(safe-area-inset-top));
      }

      .status-chip {
        top: calc(6.65rem + env(safe-area-inset-top));
      }
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>

<body>
  <div class="p4-shell">
    <canvas id="viewer"></canvas>
  </div>

  <div class="loading-cover" id="loading-cover">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Loading 3D scene…</div>
  </div>

  <div class="top-bar">
    <button class="back-btn" type="button" onclick="window.location='../'">← Back</button>

    <div class="title-wrap">
      <div class="title-main">English Situation 3D</div>
      <div class="title-sub">Tap objects to learn</div>
    </div>

    <button class="teach-pill" id="teach-btn" type="button">Teach: OFF</button>
  </div>

  <div class="tool-row">
    <label for="file-input">📦 Load .glb</label>
    <input id="file-input" type="file" accept=".glb,.gltf" />
    <button id="reset-btn" type="button">↺ Reset</button>
    <button id="auto-btn" type="button">🔄 Auto: OFF</button>
    <button id="names-btn" type="button">👁 Names</button>
    <button id="clear-btn" type="button">🧹 Clear Teach</button>
  </div>

  <div class="status-chip" id="status-chip">Preparing scene…</div>

  <div class="tap-hint" id="tap-hint">
    👆 Tap an object • Drag to rotate • Pinch to zoom
  </div>

  <div class="object-list" id="object-list">
    <div class="object-list-title">Object names in this scene</div>
    <div id="object-list-content"></div>
  </div>

  <div class="info-panel" id="info-panel">
    <button class="panel-close" type="button" id="panel-close">✕</button>

    <div class="panel-label" id="panel-label">VOCABULARY</div>
    <div class="panel-word" id="panel-word">Word</div>
    <div class="panel-phonetic" id="panel-phonetic"></div>
    <div class="panel-example" id="panel-example"></div>
    <div class="dialogue-box" id="dialogue-box"></div>
    <div class="panel-buttons">
      <button class="btn btn-green" type="button" id="speak-btn">🔊 Speak</button>
      <button class="btn btn-ghost" type="button" id="teach-selected-btn">✏️ Teach this</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const MODEL_URL = '../assets/models/shop.glb';
    const DATA_URL = '../assets/data/situation-items.json';
    const STORAGE_KEY = 'english-ar-part4-taught-words-v2';

    const canvas = document.getElementById('viewer');
    const loadingCover = document.getElementById('loading-cover');
    const loadingText = document.getElementById('loading-text');
    const statusChip = document.getElementById('status-chip');
    const tapHint = document.getElementById('tap-hint');

    const teachBtn = document.getElementById('teach-btn');
    const resetBtn = document.getElementById('reset-btn');
    const autoBtn = document.getElementById('auto-btn');
    const namesBtn = document.getElementById('names-btn');
    const clearBtn = document.getElementById('clear-btn');
    const fileInput = document.getElementById('file-input');

    const panel = document.getElementById('info-panel');
    const panelClose = document.getElementById('panel-close');
    const panelLabel = document.getElementById('panel-label');
    const panelWord = document.getElementById('panel-word');
    const panelPhonetic = document.getElementById('panel-phonetic');
    const panelExample = document.getElementById('panel-example');
    const dialogueBox = document.getElementById('dialogue-box');
    const speakBtn = document.getElementById('speak-btn');
    const teachSelectedBtn = document.getElementById('teach-selected-btn');

    const objectList = document.getElementById('object-list');
    const objectListContent = document.getElementById('object-list-content');

    let situationItems = [];
    let taught = loadTaughtWords();
    let teachMode = false;
    let autoRotate = false;
    let currentObject = null;
    let currentInfo = null;
    let modelRoot = null;
    let clickableObjects = [];
    let originalMaterials = new Map();
    let selectedHighlight = null;
    let panelAnchorPoint = null;

    let pointerDown = null;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0e1a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 200);
    camera.position.set(3.2, 2.2, 4.2);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.rotateSpeed = 0.72;
    controls.zoomSpeed = 0.85;
    controls.panSpeed = 0.55;
    controls.minDistance = 1.2;
    controls.maxDistance = 12;
    controls.target.set(0, 0.8, 0);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    setupLights();
    await loadData();
    await loadModelOrDemo(MODEL_URL);
    animate();

    // ───────────────────────────────────────
    // Setup
    // ───────────────────────────────────────
    function setupLights() {
      const hemi = new THREE.HemisphereLight(0xffffff, 0x102018, 1.7);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 2.0);
      dir.position.set(4, 6, 5);
      dir.castShadow = true;
      dir.shadow.mapSize.set(1024, 1024);
      scene.add(dir);

      const fill = new THREE.PointLight(0x06d6a0, 1.1, 9);
      fill.position.set(-3, 2.5, 2);
      scene.add(fill);
    }

    async function loadData() {
      try {
        const res = await fetch(DATA_URL);
        if (!res.ok) throw new Error('situation-items.json not found');
        situationItems = await res.json();
      } catch (err) {
        console.warn('[Part4] Could not load situation-items.json:', err);
        situationItems = [];
      }
    }

    async function loadModelOrDemo(url) {
      setStatus('Loading model…');
      loadingText.textContent = 'Loading 3D model…';

      try {
        await loadGLB(url);
        setStatus('Model loaded. Tap an object.');
      } catch (err) {
        console.warn('[Part4] shop.glb not found or failed. Using demo scene.', err);
        createDemoScene();
        setStatus('Demo scene loaded. Add shop.glb for your real model.');
      }

      collectClickableObjects();
      fitCameraToModel();
      refreshObjectList();
      loadingCover.classList.add('hidden');
      setTimeout(() => {
        loadingCover.style.display = 'none';
      }, 450);
    }

    function loadGLB(url) {
      return new Promise((resolve, reject) => {
        const loader = new GLTFLoader();
        loader.load(
          url,
          gltf => {
            clearModel();

            modelRoot = gltf.scene;
            modelRoot.name = modelRoot.name || 'EnglishSituationModel';

            modelRoot.traverse(obj => {
              if (obj.isMesh) {
                obj.castShadow = true;
                obj.receiveShadow = true;
                obj.userData.originalName = getObjectKey(obj);

                if (obj.material) {
                  obj.material = obj.material.clone();
                  if ('roughness' in obj.material) obj.material.roughness = 0.55;
                  if ('metalness' in obj.material) obj.material.metalness = Math.min(obj.material.metalness || 0, 0.35);
                }
              }
            });

            scene.add(modelRoot);
            resolve();
          },
          undefined,
          reject
        );
      });
    }

    function clearModel() {
      if (modelRoot) {
        scene.remove(modelRoot);
        modelRoot.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose && m.dispose());
            else obj.material.dispose && obj.material.dispose();
          }
        });
      }

      modelRoot = null;
      clickableObjects = [];
      originalMaterials.clear();
      selectedHighlight = null;
    }

    function createDemoScene() {
      clearModel();

      modelRoot = new THREE.Group();
      modelRoot.name = 'DemoConvenienceStore';

      const floor = makeBox('Floor', [5.8, 0.08, 4.4], [0, -0.04, 0], 0x142033);
      floor.receiveShadow = true;
      modelRoot.add(floor);

      const backWall = makeBox('Wall', [5.8, 2.5, 0.08], [0, 1.2, -2.2], 0x1a2740);
      modelRoot.add(backWall);

      const shelf1 = makeBox('Shelf', [4.8, 0.15, 0.55], [0, 0.65, -1.7], 0x32415f);
      const shelf2 = makeBox('Snack Shelf', [4.8, 0.15, 0.55], [0, 1.25, -1.7], 0x32415f);
      const counter = makeBox('Counter', [2.2, 0.85, 0.8], [-1.4, 0.42, 0.8], 0x23364f);
      const cashier = makeBox('Cashier Counter', [0.72, 0.32, 0.38], [-1.4, 1.0, 0.78], 0x06d6a0);
      const cola = makeCylinder('Coca-Cola', 0.18, 0.72, [1.35, 0.44, -1.55], 0xff3b8f);
      const water = makeCylinder('Water Bottle', 0.16, 0.74, [1.85, 0.45, -1.55], 0x00d4ff);
      const exit = makeBox('Exit Sign', [0.9, 0.32, 0.05], [2.0, 2.05, -2.13], 0x06d6a0);
      const restroom = makeBox('Restroom Sign', [0.9, 0.32, 0.05], [-2.0, 2.05, -2.13], 0x00d4ff);
      const warning = makeBox('Warning Sign', [0.65, 0.46, 0.05], [0, 2.02, -2.13], 0xff9f1c);
      const conversation = createConversationPeople();

      modelRoot.add(shelf1, shelf2, counter, cashier, cola, water, exit, restroom, warning, conversation);

      scene.add(modelRoot);
    }

    function makeBox(name, size, position, color) {
      const geometry = new THREE.BoxGeometry(...size);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.55,
        metalness: 0.08
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = name;
      mesh.position.set(...position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function makeCylinder(name, radius, height, position, color) {
      const geometry = new THREE.CylinderGeometry(radius, radius, height, 32);
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.42,
        metalness: 0.1
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.name = name;
      mesh.position.set(...position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function createConversationPeople() {
      const group = new THREE.Group();
      group.name = 'At the Counter Conversation';

      // Place the conversation beside the cashier counter, not on top of it.
      // Counter area is around x -2.5 to -0.3, z 0.4 to 1.2.
      // These people are moved to the right side of the counter.
      const customer = createPerson('Customer', [0.45, 0, 1.08], 0x00d4ff, 0xf0c7a6);
      customer.rotation.y = Math.PI * 0.48;

      const seller = createPerson('Seller', [1.05, 0, 0.48], 0xffd60a, 0xf0c7a6);
      seller.rotation.y = -Math.PI * 0.28;

      // Large invisible hit area so learners can tap the conversation easily.
      // It is also moved beside the cashier counter to avoid overlapping the counter mesh.
      const hitGeometry = new THREE.BoxGeometry(1.05, 1.65, 0.95);
      const hitMaterial = new THREE.MeshBasicMaterial({
        color: 0x06d6a0,
        transparent: true,
        opacity: 0.015,
        depthWrite: false
      });
      const hitBox = new THREE.Mesh(hitGeometry, hitMaterial);
      hitBox.name = 'At the Counter Conversation';
      hitBox.position.set(0.75, 0.88, 0.78);
      hitBox.userData.isConversationHitbox = true;

      group.add(customer, seller, hitBox);
      return group;
    }

    function createPerson(name, position, shirtColor, skinColor) {
      const group = new THREE.Group();
      group.name = name;
      group.position.set(...position);

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.16, 0.22, 0.62, 24),
        new THREE.MeshStandardMaterial({ color: shirtColor, roughness: 0.52, metalness: 0.05 })
      );
      body.name = `${name} Body`;
      body.position.set(0, 0.62, 0);
      body.castShadow = true;

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.17, 24, 18),
        new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.58, metalness: 0.02 })
      );
      head.name = `${name} Head`;
      head.position.set(0, 1.08, 0);
      head.castShadow = true;

      const leftArm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 0.46, 12),
        new THREE.MeshStandardMaterial({ color: skinColor, roughness: 0.58, metalness: 0.02 })
      );
      leftArm.name = `${name} Arm`;
      leftArm.position.set(-0.23, 0.7, 0.02);
      leftArm.rotation.z = -0.55;
      leftArm.castShadow = true;

      const rightArm = leftArm.clone();
      rightArm.name = `${name} Arm`;
      rightArm.position.set(0.23, 0.7, 0.02);
      rightArm.rotation.z = 0.55;
      rightArm.castShadow = true;

      const legs = new THREE.Mesh(
        new THREE.BoxGeometry(0.28, 0.34, 0.16),
        new THREE.MeshStandardMaterial({ color: 0x1a2035, roughness: 0.6, metalness: 0.04 })
      );
      legs.name = `${name} Legs`;
      legs.position.set(0, 0.18, 0);
      legs.castShadow = true;

      group.add(body, head, leftArm, rightArm, legs);
      return group;
    }

    function collectClickableObjects() {
      clickableObjects = [];

      if (!modelRoot) return;

      modelRoot.traverse(obj => {
        if (obj.isMesh) {
          clickableObjects.push(obj);
          if (obj.material && !originalMaterials.has(obj.uuid)) {
            originalMaterials.set(obj.uuid, obj.material.clone());
          }
        }
      });
    }

    function fitCameraToModel() {
      if (!modelRoot) return;

      const box = new THREE.Box3().setFromObject(modelRoot);
      if (box.isEmpty()) return;

      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const dist = Math.max(3.0, maxDim * 1.55);

      camera.position.set(center.x + dist * 0.78, center.y + dist * 0.55, center.z + dist * 0.95);
      controls.target.copy(center);
      controls.target.y += size.y * 0.06;
      controls.update();
    }

    // ───────────────────────────────────────
    // Interaction
    // ───────────────────────────────────────
    canvas.addEventListener('pointerdown', event => {
      pointerDown = {
        x: event.clientX,
        y: event.clientY,
        time: performance.now()
      };
    });

    canvas.addEventListener('pointerup', event => {
      if (!pointerDown) return;

      const dx = Math.abs(event.clientX - pointerDown.x);
      const dy = Math.abs(event.clientY - pointerDown.y);
      const dt = performance.now() - pointerDown.time;

      pointerDown = null;

      // Ignore drags used for orbit control.
      if (dx > 10 || dy > 10 || dt > 650) return;

      handlePick(event.clientX, event.clientY);
    });

    function handlePick(clientX, clientY) {
      if (!clickableObjects.length) return;

      pointer.x = (clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableObjects, true);

      if (!hits.length) return;

      const hit = hits[0];
      const mesh = hit.object;
      currentObject = mesh;
      panelAnchorPoint = hit.point.clone();

      tapHint.classList.add('hidden');
      highlightObject(mesh);

      if (teachMode) {
        teachObject(mesh, panelAnchorPoint);
        return;
      }

      const info = getInfoForObject(mesh);
      showInfo(info, mesh, panelAnchorPoint);
    }

    function highlightObject(mesh) {
      if (selectedHighlight && selectedHighlight !== mesh) {
        restoreMaterial(selectedHighlight);
      }

      selectedHighlight = mesh;

      if (!mesh.material) return;

      const mat = mesh.material.clone();
      mat.emissive = mat.emissive || new THREE.Color(0x000000);
      mat.emissive.set(0x064b3d);
      mat.emissiveIntensity = 0.45;
      mesh.material = mat;
    }

    function restoreMaterial(mesh) {
      const original = originalMaterials.get(mesh.uuid);
      if (original) mesh.material = original.clone();
    }

    // ───────────────────────────────────────
    // Teach Mode / Vocabulary
    // ───────────────────────────────────────
    function getObjectKey(obj) {
      const names = [];
      let cur = obj;

      while (cur && cur !== modelRoot && names.length < 4) {
        if (cur.name) names.push(cur.name);
        cur = cur.parent;
      }

      return names[0] || obj.uuid || 'UnknownObject';
    }

    function normalize(text) {
      return String(text || '')
        .toLowerCase()
        .replace(/[_\-]+/g, ' ')
        .replace(/[^a-z0-9\s]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function titleCase(text) {
      return String(text || '')
        .replace(/[_\-]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .replace(/\w\S*/g, s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase());
    }

    function getInfoForObject(obj) {
      const key = getObjectKey(obj);
      const normalizedKey = normalize(key);

      const taughtInfo = taught[key] || taught[normalizedKey];
      if (taughtInfo) {
        return {
          ...taughtInfo,
          label: 'TAUGHT WORD',
          objectKey: key,
          source: 'localStorage'
        };
      }

      const matchedItem = matchSituationItem(normalizedKey);
      if (matchedItem) {
        return {
          ...matchedItem,
          label: matchedItem.type === 'dialogue' ? 'CONVERSATION' : 'VOCABULARY',
          objectKey: key,
          source: 'situation-items.json'
        };
      }

      const builtin = matchBuiltin(normalizedKey);
      if (builtin) {
        return {
          ...builtin,
          label: 'VOCABULARY',
          objectKey: key,
          source: 'built-in'
        };
      }

      const guessed = guessWordFromObjectName(key);
      return {
        type: 'unknown',
        word: guessed,
        phonetic: '',
        example: 'Turn on Teach Mode to save the correct English word.',
        label: 'UNKNOWN OBJECT',
        objectKey: key,
        source: 'object-name'
      };
    }

    function matchSituationItem(normalizedKey) {
      for (const item of situationItems) {
        const keys = [
          item.id,
          item.label,
          item.word,
          item.type
        ].map(normalize).filter(Boolean);

        for (const k of keys) {
          if (!k) continue;

          if (
            normalizedKey === k ||
            normalizedKey.includes(k) ||
            k.includes(normalizedKey)
          ) {
            return item;
          }
        }
      }

      return null;
    }

    function matchBuiltin(normalizedKey) {
      if (
        normalizedKey.includes('at the counter conversation') ||
        normalizedKey.includes('conversation icon') ||
        normalizedKey.includes('customer') ||
        normalizedKey.includes('seller')
      ) {
        return {
          type: 'dialogue',
          word: 'At the Counter',
          dialogue: [
            { speaker: 'A', line: 'Hello. What would you like to buy?' },
            { speaker: 'B', line: 'I would like a bottle of water, please.' },
            { speaker: 'A', line: 'Sure. Anything else?' },
            { speaker: 'B', line: 'No, thank you. How much is it?' },
            { speaker: 'A', line: 'It is twenty baht.' },
            { speaker: 'B', line: 'Here you are.' },
            { speaker: 'A', line: 'Thank you. Have a nice day.' },
            { speaker: 'B', line: 'Thank you.' }
          ]
        };
      }

      const builtins = [
        { keys: ['table', 'desk'], word: 'Table', phonetic: '/ˈteɪbəl/', example: 'This is a table.' },
        { keys: ['chair', 'seat'], word: 'Chair', phonetic: '/tʃer/', example: 'Please sit on the chair.' },
        { keys: ['counter', 'cashier counter'], word: 'Counter', phonetic: '/ˈkaʊntər/', example: 'Please pay at the counter.' },
        { keys: ['cashier'], word: 'Cashier', phonetic: '/kæˈʃɪr/', example: 'The cashier is helping a customer.' },
        { keys: ['shelf', 'rack'], word: 'Shelf', phonetic: '/ʃelf/', example: 'The drinks are on the shelf.' },
        { keys: ['door'], word: 'Door', phonetic: '/dɔːr/', example: 'Please open the door.' },
        { keys: ['exit'], word: 'Exit', phonetic: '/ˈɛɡzɪt/', example: 'Please use the exit on the right.' },
        { keys: ['restroom', 'toilet', 'bathroom'], word: 'Restroom', phonetic: '/ˈrɛstruːm/', example: 'Excuse me, where is the restroom?' },
        { keys: ['warning'], word: 'Warning', phonetic: '/ˈwɔːrnɪŋ/', example: 'The warning sign says do not enter.' },
        { keys: ['cola', 'coke', 'coca cola'], word: 'Coca-Cola', phonetic: '/ˌkoʊkəˈkoʊlə/', example: "I'd like a cold Coca-Cola, please." },
        { keys: ['water', 'bottle'], word: 'Water Bottle', phonetic: '/ˈwɔːtər ˈbɑːtəl/', example: 'I would like a bottle of water.' },
        { keys: ['product', 'goods', 'item'], word: 'Product', phonetic: '/ˈprɑːdʌkt/', example: 'This product is on sale.' },
        { keys: ['shop', 'store'], word: 'Store', phonetic: '/stɔːr/', example: 'The store is open today.' },
        { keys: ['sign'], word: 'Sign', phonetic: '/saɪn/', example: 'Read the sign carefully.' }
      ];

      for (const item of builtins) {
        if (item.keys.some(k => normalizedKey.includes(k) || k.includes(normalizedKey))) {
          return {
            type: 'vocab',
            word: item.word,
            phonetic: item.phonetic,
            example: item.example
          };
        }
      }

      return null;
    }

    function guessWordFromObjectName(key) {
      const cleaned = String(key || 'Object')
        .replace(/[_\-]+/g, ' ')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .replace(/\d+/g, '')
        .replace(/\s+/g, ' ')
        .trim();

      if (!cleaned || /^material|object|mesh|cube|node$/i.test(cleaned)) {
        return 'Unknown Object';
      }

      return titleCase(cleaned);
    }

    function teachObject(obj, anchorPoint = null) {
      const key = getObjectKey(obj);
      const current = getInfoForObject(obj);
      const word = prompt('English word for this object:', current.word && current.word !== 'Unknown Object' ? current.word : '');

      if (!word) {
        setStatus('Teach cancelled.');
        return;
      }

      const phonetic = prompt('Phonetic / pronunciation (optional):', current.phonetic || '');
      const example = prompt('Example sentence:', current.example && current.source !== 'object-name'
        ? current.example
        : `This is a ${word}.`);

      const info = {
        type: 'vocab',
        word: word.trim(),
        phonetic: (phonetic || '').trim(),
        example: (example || `This is a ${word.trim()}.`).trim()
      };

      taught[key] = info;
      taught[normalize(key)] = info;
      saveTaughtWords();

      setStatus(`Saved word: ${info.word}`);
      showInfo({
        ...info,
        label: 'TAUGHT WORD',
        objectKey: key,
        source: 'localStorage'
      }, obj, anchorPoint || getObjectAnchorPoint(obj));

      refreshObjectList();
    }

    function loadTaughtWords() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch {
        return {};
      }
    }

    function saveTaughtWords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(taught));
    }


    function getObjectAnchorPoint(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      const center = new THREE.Vector3();

      if (!box.isEmpty()) {
        box.getCenter(center);
        const size = new THREE.Vector3();
        box.getSize(size);
        center.y += Math.min(size.y * 0.25, 0.35);
        return center;
      }

      obj.getWorldPosition(center);
      return center;
    }

    function updateFloatingPanelPosition(force = false) {
      if (!panel.classList.contains('show') || !panelAnchorPoint) return;

      const projected = panelAnchorPoint.clone().project(camera);

      if (projected.z < -1 || projected.z > 1) {
        if (force) {
          panel.style.left = '16px';
          panel.style.top = '160px';
        }
        return;
      }

      const screenX = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const screenY = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      const rect = panel.getBoundingClientRect();
      const width = rect.width || Math.min(360, window.innerWidth - 32);
      const height = rect.height || 260;

      const margin = 12;
      const topLimit = Math.max(86, window.innerHeight * 0.10);
      const bottomLimit = window.innerHeight - height - Math.max(18, window.innerHeight * 0.03);

      let left = screenX + 18;

      if (left + width > window.innerWidth - margin) {
        left = screenX - width - 18;
      }

      if (left < margin) {
        left = screenX - width / 2;
      }

      left = clamp(left, margin, window.innerWidth - width - margin);

      let top = screenY - height * 0.48;

      top = clamp(top, topLimit, Math.max(topLimit, bottomLimit));

      panel.style.left = `${left}px`;
      panel.style.top = `${top}px`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    // ───────────────────────────────────────
    // UI Panel
    // ───────────────────────────────────────
    function showInfo(info, obj, anchorPoint = null) {
      currentInfo = info;
      panelAnchorPoint = anchorPoint ? anchorPoint.clone() : getObjectAnchorPoint(obj);

      panelLabel.textContent = info.label || 'VOCABULARY';
      panelWord.textContent = info.word || 'Unknown Object';
      panelPhonetic.textContent = info.phonetic || '';

      dialogueBox.innerHTML = '';

      if (info.type === 'dialogue' && Array.isArray(info.dialogue)) {
        panelExample.style.display = 'none';
        dialogueBox.style.display = 'grid';

        info.dialogue.forEach(line => {
          const row = document.createElement('div');
          row.className = 'dialogue-line';

          const speaker = document.createElement('div');
          speaker.className = 'dialogue-speaker';
          speaker.textContent = `${line.speaker}:`;

          const text = document.createElement('div');
          text.className = 'dialogue-text';
          text.textContent = line.line;

          row.appendChild(speaker);
          row.appendChild(text);
          dialogueBox.appendChild(row);
        });
      } else {
        dialogueBox.style.display = 'none';
        panelExample.style.display = 'block';
        panelExample.textContent = info.example || 'No example yet.';
      }

      panel.classList.add('show');
      updateFloatingPanelPosition(true);

      speakWordOnly(info);
      setStatus(`${info.word || 'Object'} selected`);
    }

    function closePanel() {
      panel.classList.remove('show');
      panelAnchorPoint = null;
    }

    function speakWordOnly(info) {
      if (!info) return;

      if (info.type === 'dialogue' && Array.isArray(info.dialogue)) {
        speak(info.dialogue[0]?.line || info.word);
      } else {
        speak(info.word);
      }
    }

    function speakFullInfo() {
      if (!currentInfo) return;

      if (currentInfo.type === 'dialogue' && Array.isArray(currentInfo.dialogue)) {
        speak(currentInfo.dialogue.map(d => d.line).join('. '));
      } else {
        speak(`${currentInfo.word}. ${currentInfo.example || ''}`);
      }
    }

    function speak(text) {
      if (!('speechSynthesis' in window) || !text) return;

      window.speechSynthesis.cancel();

      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.88;
      utt.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const voice =
        voices.find(v => v.lang === 'en-US' && v.localService) ||
        voices.find(v => v.lang && v.lang.startsWith('en'));

      if (voice) utt.voice = voice;

      window.speechSynthesis.speak(utt);
    }

    // ───────────────────────────────────────
    // Buttons
    // ───────────────────────────────────────
    teachBtn.addEventListener('click', () => {
      teachMode = !teachMode;
      teachBtn.classList.toggle('on', teachMode);
      teachBtn.textContent = teachMode ? 'Teach: ON' : 'Teach: OFF';
      setStatus(teachMode ? 'Teach Mode ON. Tap an object to save a word.' : 'Teach Mode OFF. Tap objects to learn.');
    });

    resetBtn.addEventListener('click', () => {
      fitCameraToModel();
      closePanel();
      setStatus('Camera reset.');
    });

    autoBtn.addEventListener('click', () => {
      autoRotate = !autoRotate;
      autoBtn.classList.toggle('active', autoRotate);
      autoBtn.textContent = autoRotate ? '🔄 Auto: ON' : '🔄 Auto: OFF';
      controls.autoRotate = autoRotate;
      controls.autoRotateSpeed = 1.1;
    });

    namesBtn.addEventListener('click', () => {
      objectList.classList.toggle('show');
      namesBtn.classList.toggle('active', objectList.classList.contains('show'));
    });

    clearBtn.addEventListener('click', () => {
      const ok = confirm('Clear all taught words saved on this browser?');
      if (!ok) return;

      taught = {};
      saveTaughtWords();
      setStatus('Taught words cleared.');
      refreshObjectList();
    });

    fileInput.addEventListener('change', async event => {
      const file = event.target.files?.[0];
      if (!file) return;

      const url = URL.createObjectURL(file);

      loadingCover.style.display = 'flex';
      loadingCover.classList.remove('hidden');
      loadingText.textContent = `Loading ${file.name}…`;

      try {
        await loadGLB(url);
        collectClickableObjects();
        fitCameraToModel();
        refreshObjectList();
        setStatus(`${file.name} loaded. Tap an object.`);
      } catch (err) {
        console.error('[Part4] File load error:', err);
        setStatus('Cannot load this GLB/GLTF file.');
      } finally {
        URL.revokeObjectURL(url);
        loadingCover.classList.add('hidden');
        setTimeout(() => { loadingCover.style.display = 'none'; }, 450);
      }
    });

    panelClose.addEventListener('click', closePanel);
    speakBtn.addEventListener('click', speakFullInfo);
    teachSelectedBtn.addEventListener('click', () => {
      if (!currentObject) return;
      teachObject(currentObject, getObjectAnchorPoint(currentObject));
    });

    // ───────────────────────────────────────
    // Object list
    // ───────────────────────────────────────
    function refreshObjectList() {
      objectListContent.innerHTML = '';

      const names = clickableObjects
        .map(obj => getObjectKey(obj))
        .filter(Boolean);

      const unique = [...new Set(names)].sort((a, b) => a.localeCompare(b));

      if (!unique.length) {
        const div = document.createElement('div');
        div.className = 'object-list-item';
        div.textContent = 'No mesh objects found.';
        objectListContent.appendChild(div);
        return;
      }

      unique.forEach(name => {
        const info = taught[name] || taught[normalize(name)];
        const div = document.createElement('div');
        div.className = 'object-list-item';
        div.textContent = info ? `${name} → ${info.word}` : name;
        objectListContent.appendChild(div);
      });
    }

    function setStatus(text) {
      statusChip.textContent = text;
    }

    // ───────────────────────────────────────
    // Resize / Animation
    // ───────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 1.75));
      updateFloatingPanelPosition(true);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateFloatingPanelPosition();
      renderer.render(scene, camera);
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
