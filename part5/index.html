<!DOCTYPE html>
<!-- v1.0 - Part 5: AI Label Reader (Azure AI Vision OCR) -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e1a" />
  <title>Part 5 – AI Label Reader</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    /* ══════════════════════════════════════════
       CSS — matches global style.css Part 5 theme
       Accent: Indigo-Violet #a259ff
       ══════════════════════════════════════════ */
    :root {
      --bg-dark:    #0a0e1a;
      --bg-card:    #12182b;
      --c5:         #a259ff;
      --c5-dim:     rgba(162,89,255,0.15);
      --c5-border:  rgba(162,89,255,0.35);
      --c5-glow:    rgba(162,89,255,0.45);
      --green:      #06d6a0;
      --pink:       #ff3b8f;
      --cyan:       #00d4ff;
      --text-white: #ffffff;
      --text-muted: #8892a4;
      --text-dim:   #4a5568;
      --font-main:  'Nunito', sans-serif;
      --font-mono:  'Space Mono', monospace;
      --r-lg:       24px;
      --r-sm:       10px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-tap-highlight-color: transparent; }
    body {
      font-family: var(--font-main);
      background: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: inherit; border: none; outline: none;
             -webkit-tap-highlight-color: transparent; }

    /* ── Screen system ───────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.3s ease;
      z-index: 1;
    }
    .screen.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════════════════
       SCREEN 1 — START
       ══════════════════════════════════════════ */
    #screen-start { background: var(--bg-dark); padding: 2rem 1.5rem; text-align: center; gap: 0; }

    /* Orbs */
    .orb { position: absolute; border-radius: 50%; filter: blur(80px);
           opacity: 0.18; pointer-events: none; }
    .orb-1 { width: 280px; height: 280px; background: var(--c5);
              top: -60px; right: -60px; animation: orb-float 8s ease-in-out infinite; }
    .orb-2 { width: 200px; height: 200px; background: #3b82f6;
              bottom: 12%; left: -40px; animation: orb-float 11s ease-in-out infinite reverse; }
    @keyframes orb-float {
      0%,100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-22px) scale(1.06); }
    }

    /* Back button */
    .back-btn {
      position: fixed; top: 1rem; left: 1rem; z-index: 900;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 0.82rem; font-weight: 700;
      padding: 0.5rem 0.9rem; border-radius: 30px;
      backdrop-filter: blur(8px);
    }

    .part-badge {
      font-size: 0.62rem; font-weight: 800; letter-spacing: 3px;
      text-transform: uppercase; color: var(--c5);
      border: 1.5px solid var(--c5-border); padding: 0.25rem 0.8rem;
      border-radius: 20px; margin-bottom: 1.5rem;
      background: var(--c5-dim); display: inline-block;
    }

    .start-icon-ring {
      width: 100px; height: 100px; border-radius: 50%;
      background: var(--c5-dim); border: 2.5px solid var(--c5-border);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; margin: 0 auto 1.5rem;
      animation: ring-pulse 3s ease-in-out infinite;
    }
    @keyframes ring-pulse {
      0%,100% { box-shadow: 0 0 0 0 var(--c5-glow); }
      50%      { box-shadow: 0 0 0 16px rgba(162,89,255,0); }
    }

    .start-title    { font-size: 2rem; font-weight: 900; color: var(--c5);
                      margin-bottom: 0.4rem; letter-spacing: -0.5px; }
    .start-subtitle { font-size: 0.85rem; color: var(--text-muted); font-weight: 700;
                      line-height: 1.55; max-width: 280px; margin: 0 auto 2rem; }

    .features { display: flex; flex-direction: column; gap: 0.6rem;
                margin-bottom: 2rem; text-align: left; width: 100%; max-width: 300px; }
    .feature-item {
      display: flex; align-items: center; gap: 0.7rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 0.65rem 0.9rem; border-radius: var(--r-sm);
    }
    .feature-icon { font-size: 1.1rem; }
    .feature-text { font-size: 0.8rem; font-weight: 700; color: var(--text-muted); }

    /* ── Buttons ─────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.78rem 1.4rem; border-radius: 50px;
      font-size: 0.92rem; font-weight: 800; font-family: var(--font-main);
      transition: transform 0.12s, opacity 0.12s;
    }
    .btn:active  { transform: scale(0.94); opacity: 0.85; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .btn-purple  { background: var(--c5); color: #fff; }
    .btn-green   { background: var(--green); color: #000; }
    .btn-ghost   { background: rgba(255,255,255,0.07); color: #fff;
                   border: 1.5px solid rgba(255,255,255,0.15); }
    .btn-lg      { padding: 0.95rem 2rem; font-size: 1rem; }

    /* ══════════════════════════════════════════
       SCREEN 2 — CAMERA
       ══════════════════════════════════════════ */
    #screen-camera { background: #000; padding: 0; justify-content: flex-start; }

    #camera-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0;
      transition: filter 0.2s ease;
    }
    #camera-video.frozen { filter: brightness(0.75) saturate(0.5); }

    /* ── Status badge ─────────────────────────── */
    #cam-status {
      position: fixed; top: 1rem; left: 50%; transform: translateX(-50%);
      z-index: 200; font-size: 0.72rem; font-weight: 800;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 0.35rem 1rem; border-radius: 20px; white-space: nowrap;
      backdrop-filter: blur(10px); transition: all 0.3s;
      background: rgba(10,14,26,0.85);
      border: 1.5px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
    }
    #cam-status.s-ready    { color: var(--c5);   border-color: var(--c5-border); }
    #cam-status.s-capture  { color: var(--cyan);  border-color: rgba(0,212,255,0.4); }
    #cam-status.s-reading  { color: var(--cyan);  border-color: rgba(0,212,255,0.4); }
    #cam-status.s-done     { color: var(--green); border-color: rgba(6,214,160,0.4); }
    #cam-status.s-notfound { color: var(--pink);  border-color: rgba(255,59,143,0.4); }
    #cam-status.s-error    { color: var(--pink);  border-color: rgba(255,59,143,0.4); }

    /* ── Progress bar ─────────────────────────── */
    #progress-wrap {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 3px; background: rgba(255,255,255,0.06);
      transition: opacity 0.3s;
    }
    #progress-wrap.hidden { opacity: 0; }
    #progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--c5), var(--cyan));
      border-radius: 0 2px 2px 0;
      transition: width 0.3s ease;
    }

    /* ── Scan frame ───────────────────────────── */
    #scan-frame-wrap {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -54%);
      z-index: 100; pointer-events: none;
      transition: opacity 0.3s;
    }
    #scan-frame-wrap.hidden { opacity: 0; }

    .scan-box {
      width: min(320px, 84vw);
      height: min(210px, 32vh);
      position: relative;
    }

    /* Corner brackets */
    .scan-box::before, .scan-box::after,
    .sb-br, .sb-bl {
      content: ''; position: absolute; width: 28px; height: 28px;
    }
    .scan-box::before { top:-3px; left:-3px;
      border-top: 3px solid var(--c5); border-left: 3px solid var(--c5);
      border-radius: 4px 0 0 0; }
    .scan-box::after  { top:-3px; right:-3px;
      border-top: 3px solid var(--c5); border-right: 3px solid var(--c5);
      border-radius: 0 4px 0 0; }
    .sb-br { bottom:-3px; right:-3px;
      border-bottom: 3px solid var(--c5); border-right: 3px solid var(--c5);
      border-radius: 0 0 4px 0; }
    .sb-bl { bottom:-3px; left:-3px;
      border-bottom: 3px solid var(--c5); border-left: 3px solid var(--c5);
      border-radius: 0 0 0 4px; }

    /* Dim area outside box */
    .scan-dim-top, .scan-dim-bottom, .scan-dim-left, .scan-dim-right {
      position: fixed; background: rgba(0,0,0,0.45); z-index: 99;
      pointer-events: none;
    }

    /* Sweep animation */
    .scan-sweep {
      position: absolute; left: 3px; right: 3px; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--c5) 30%,
                  #fff 50%, var(--c5) 70%, transparent 100%);
      border-radius: 2px; opacity: 0; top: 0;
    }
    .scan-sweep.active { animation: sweep 1.8s ease-in-out infinite; opacity: 1; }
    @keyframes sweep {
      0%   { top: 3px;  opacity: 0.9; }
      100% { top: calc(100% - 5px); opacity: 0.2; }
    }

    .scan-fill {
      position: absolute; inset: 0;
      border: 1px solid rgba(162,89,255,0.18);
      border-radius: 3px;
    }
    .scan-hint-text {
      text-align: center; margin-top: 0.75rem;
      font-size: 0.72rem; font-weight: 700;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px; text-transform: uppercase;
    }

    /* ── Frozen preview overlay ───────────────── */
    #frozen-canvas {
      position: fixed; inset: 0; z-index: 50;
      width: 100%; height: 100%; object-fit: cover;
      display: none;
    }

    /* ── Scan button ──────────────────────────── */
    #btn-scan {
      position: fixed;
      bottom: max(2.5rem, env(safe-area-inset-bottom, 2.5rem));
      left: 50%; transform: translateX(-50%);
      z-index: 200; min-width: 180px; justify-content: center;
      box-shadow: 0 0 24px rgba(162,89,255,0.4);
      transition: transform 0.12s, opacity 0.12s, box-shadow 0.2s;
    }
    #btn-scan:not(:disabled):active {
      transform: translateX(-50%) scale(0.93);
      box-shadow: 0 0 10px rgba(162,89,255,0.2);
    }
    #btn-scan.hidden { opacity: 0; pointer-events: none; }

    /* ══════════════════════════════════════════
       RESULT POPUP — slides up from bottom
       ══════════════════════════════════════════ */
    #result-popup {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
      background: var(--bg-card);
      border-top: 2.5px solid var(--c5);
      border-radius: 22px 22px 0 0;
      padding: 1.3rem 1.3rem max(2.2rem, env(safe-area-inset-bottom, 2.2rem));
      transform: translateY(100%);
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
      max-height: 65vh; overflow-y: auto;
    }
    #result-popup.show { transform: translateY(0); }

    .popup-handle {
      width: 40px; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; margin: 0 auto 1rem;
    }
    #result-label {
      font-size: 0.62rem; font-weight: 800;
      letter-spacing: 3px; text-transform: uppercase;
      color: var(--c5); margin-bottom: 0.55rem;
    }
    #result-text {
      font-size: 1rem; font-weight: 700;
      color: var(--text-white);
      line-height: 1.65; margin-bottom: 0.9rem;
      white-space: pre-wrap;
      max-height: 28vh; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: var(--c5) transparent;
    }
    #result-text::-webkit-scrollbar { width: 4px; }
    #result-text::-webkit-scrollbar-thumb { background: var(--c5); border-radius: 2px; }
    #result-text.error { color: var(--pink); font-size: 0.9rem; font-style: italic; font-weight: 600; }

    .popup-buttons { display: flex; gap: 0.6rem; flex-wrap: wrap; }

    @keyframes speak-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(6,214,160,0.5); }
      50%      { box-shadow: 0 0 0 8px rgba(6,214,160,0); }
    }
    #btn-speak.speaking { animation: speak-pulse 1s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Hidden canvas for frame capture & freeze effect -->
  <canvas id="capture-canvas" style="display:none"></canvas>
  <canvas id="frozen-canvas"></canvas>

  <!-- ══════════════════════════════════════════
       SCREEN 1 — START
       ══════════════════════════════════════════ -->
  <div id="screen-start" class="screen">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <a href="../" class="back-btn">← Back</a>

    <span class="part-badge">Part 5 · Azure AI</span>
    <div class="start-icon-ring">🏷️</div>
    <h1 class="start-title">AI Label Reader</h1>
    <p class="start-subtitle">
      Point your camera at English text on labels, signs, or products.
    </p>

    <div class="features">
      <div class="feature-item">
        <span class="feature-icon">📸</span>
        <span class="feature-text">Capture English text from the real world</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">☁️</span>
        <span class="feature-text">Azure AI Vision reads text accurately</span>
      </div>
      <div class="feature-item">
        <span class="feature-icon">🔊</span>
        <span class="feature-text">Hear the text spoken aloud in English</span>
      </div>
    </div>

    <button class="btn btn-purple btn-lg" id="btn-start" onclick="startCamera()">
      📷 Start Camera
    </button>
  </div>

  <!-- ══════════════════════════════════════════
       SCREEN 2 — CAMERA
       ══════════════════════════════════════════ -->
  <div id="screen-camera" class="screen hidden">

    <button class="back-btn" onclick="exitCamera()">← Back</button>

    <!-- Live camera feed -->
    <video id="camera-video" autoplay playsinline muted></video>

    <!-- Freeze overlay: shown while OCR runs -->
    <canvas id="frozen-canvas"></canvas>

    <!-- Progress bar (top) -->
    <div id="progress-wrap" class="hidden">
      <div id="progress-bar"></div>
    </div>

    <!-- Status badge -->
    <div id="cam-status" class="s-ready">📷 READY</div>

    <!-- Scan frame with corner brackets -->
    <div id="scan-frame-wrap">
      <div class="scan-box" id="scan-box">
        <div class="scan-fill"></div>
        <div class="sb-br"></div>
        <div class="sb-bl"></div>
        <div class="scan-sweep" id="scan-sweep"></div>
      </div>
      <p class="scan-hint-text">Aim at English text on label or sign</p>
    </div>

    <!-- Scan button -->
    <button class="btn btn-purple btn-lg" id="btn-scan" onclick="doScan()">
      🔍 Scan Text
    </button>

    <!-- Result popup -->
    <div id="result-popup">
      <div class="popup-handle"></div>
      <div id="result-label">TEXT FOUND</div>
      <div id="result-text"></div>
      <div class="popup-buttons">
        <button class="btn btn-green" id="btn-speak" onclick="speakResult()">🔊 Speak</button>
        <button class="btn btn-ghost" onclick="scanAgain()">🔄 Scan Again</button>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════
       JAVASCRIPT
       ══════════════════════════════════════════ -->
  <script>
    'use strict';

    // ─────────────────────────────────────────
    // CONFIG
    // Point to your deployed serverless function.
    // Vercel: '/api/ocr'
    // Netlify: '/.netlify/functions/ocr'
    // ─────────────────────────────────────────
    const OCR_ENDPOINT = '/api/ocr';

    // ── State ─────────────────────────────────
    let stream       = null;
    let isScanning   = false;
    let lastText     = '';

    // ── DOM refs ──────────────────────────────
    const screenStart  = document.getElementById('screen-start');
    const screenCam    = document.getElementById('screen-camera');
    const video        = document.getElementById('camera-video');
    const capCanvas    = document.getElementById('capture-canvas');
    const frozenCanvas = document.getElementById('frozen-canvas');
    const capCtx       = capCanvas.getContext('2d');
    const frozenCtx    = frozenCanvas.getContext('2d');
    const camStatus    = document.getElementById('cam-status');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const btnScan      = document.getElementById('btn-scan');
    const resultPopup  = document.getElementById('result-popup');
    const resultText   = document.getElementById('result-text');
    const resultLabel  = document.getElementById('result-label');
    const btnSpeak     = document.getElementById('btn-speak');
    const scanSweep    = document.getElementById('scan-sweep');
    const scanBox      = document.getElementById('scan-box');

    // ── Screen switch ─────────────────────────
    function showScreen(el) {
      [screenStart, screenCam].forEach(s => s.classList.add('hidden'));
      el.classList.remove('hidden');
    }

    // ═══════════════════════════════════════════
    // CAMERA
    // ═══════════════════════════════════════════
    async function startCamera() {
      const btn = document.getElementById('btn-start');
      btn.textContent = '⏳ Starting…';
      btn.disabled    = true;

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        video.srcObject = stream;
        await new Promise(r => { video.onloadedmetadata = r; });
        showScreen(screenCam);
        setStatus('ready', '📷 READY');
      } catch (err) {
        btn.textContent = '📷 Start Camera';
        btn.disabled    = false;
        let msg = 'Could not access camera.';
        if (err.name === 'NotAllowedError')   msg = 'Camera permission denied. Please allow and reload.';
        if (err.name === 'NotFoundError')     msg = 'No camera found on this device.';
        if (err.name === 'NotReadableError')  msg = 'Camera is in use by another app.';
        alert(msg);
      }
    }

    function exitCamera() {
      stopCamera();
      stopSpeech();
      resetPopup();
      showScreen(screenStart);
      const btn = document.getElementById('btn-start');
      btn.textContent = '📷 Start Camera';
      btn.disabled    = false;
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      video.srcObject = null;
    }

    // ═══════════════════════════════════════════
    // STATUS
    // ═══════════════════════════════════════════
    function setStatus(cls, text) {
      camStatus.className  = cls;
      camStatus.textContent = text;
    }

    // ═══════════════════════════════════════════
    // SCAN → CAPTURE → OCR
    // ═══════════════════════════════════════════
    async function doScan() {
      if (isScanning) return;
      isScanning = true;

      resetPopup();
      setStatus('s-capture', '📸 CAPTURING…');
      btnScan.disabled = true;

      // 1. Capture frame ──────────────────────
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      // Map scan-box screen rect → video pixel rect
      const boxRect = scanBox.getBoundingClientRect();
      const scaleX  = vw / sw;
      const scaleY  = vh / sh;

      const cropX = Math.max(0, boxRect.left   * scaleX);
      const cropY = Math.max(0, boxRect.top    * scaleY);
      const cropW = Math.min(boxRect.width  * scaleX, vw - cropX);
      const cropH = Math.min(boxRect.height * scaleY, vh - cropY);

      // Resize for upload (max 1200px wide, JPEG for smaller payload)
      const maxW  = 1200;
      const scale = Math.min(1, maxW / cropW);
      const outW  = Math.round(cropW * scale);
      const outH  = Math.round(cropH * scale);

      capCanvas.width  = outW;
      capCanvas.height = outH;
      capCtx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, outW, outH);

      // 2. Freeze video for visual feedback ────
      frozenCanvas.width  = sw;
      frozenCanvas.height = sh;
      frozenCtx.drawImage(video, 0, 0, sw, sh);
      frozenCanvas.style.display = 'block';
      video.style.filter = 'brightness(0.6) saturate(0.4)';

      // 3. Get base64 image ────────────────────
      const base64 = capCanvas.toDataURL('image/jpeg', 0.85).split(',')[1];

      // 4. Start progress animation ────────────
      progressWrap.classList.remove('hidden');
      animateProgress(0, 70, 1200);
      scanSweep.classList.add('active');
      setStatus('s-reading', '🤖 READING…');

      try {
        // 5. Call serverless function ──────────
        const res = await fetch(OCR_ENDPOINT, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ image: base64 })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }

        const data  = await res.json();
        const lines = data.lines || [];

        animateProgress(70, 100, 400);

        setTimeout(() => {
          progressWrap.classList.add('hidden');
          progressBar.style.width = '0%';
          scanSweep.classList.remove('active');
          unfreezeCamera();

          // 6. Filter & display ────────────────
          const cleaned = filterOcrLines(lines);
          if (cleaned.length === 0) {
            showError('No readable English text found. Try again.');
          } else {
            showResult(cleaned.join('\n'));
          }
        }, 500);

      } catch (err) {
        console.error('[Part5] OCR error:', err);
        progressWrap.classList.add('hidden');
        progressBar.style.width = '0%';
        scanSweep.classList.remove('active');
        unfreezeCamera();
        showError(`Error: ${err.message}`);
      } finally {
        isScanning   = false;
        btnScan.disabled = false;
      }
    }

    // ── Unfreeze camera ────────────────────────
    function unfreezeCamera() {
      frozenCanvas.style.display = 'none';
      video.style.filter = '';
    }

    // ── Smooth progress animation ──────────────
    function animateProgress(from, to, duration) {
      const start = performance.now();
      function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const v = from + (to - from) * (1 - Math.pow(1 - t, 3));
        progressBar.style.width = `${v}%`;
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    // ═══════════════════════════════════════════
    // OCR TEXT FILTER
    // Cleans up raw Azure OCR output lines.
    // ═══════════════════════════════════════════
    function filterOcrLines(lines) {
      const cleaned = [];

      for (const line of lines) {
        const t = (line || '').trim();
        if (!t) continue;

        // Drop very short fragments (1–2 chars, likely noise)
        if (t.length < 3) continue;

        // Drop lines that are mostly digits (barcodes, serials)
        const digitRatio = (t.match(/\d/g) || []).length / t.length;
        if (digitRatio > 0.7 && t.length > 4) continue;

        // Drop lines with no Latin letters at all
        if (!/[a-zA-Z]/.test(t)) continue;

        // Drop lines that are mostly symbols/punctuation
        const symbolRatio = (t.match(/[^a-zA-Z0-9 ]/g) || []).length / t.length;
        if (symbolRatio > 0.6) continue;

        // Drop very long lines that look like encoded strings
        if (t.length > 120) continue;

        cleaned.push(t);

        // Cap at 8 lines max
        if (cleaned.length >= 8) break;
      }

      return cleaned;
    }

    // ═══════════════════════════════════════════
    // RESULT / ERROR DISPLAY
    // ═══════════════════════════════════════════
    function showResult(text) {
      lastText = text;
      resultLabel.textContent = 'TEXT FOUND';
      resultLabel.style.color = 'var(--c5)';
      resultText.textContent  = text;
      resultText.classList.remove('error');
      resultPopup.classList.add('show');
      btnScan.classList.add('hidden');
      btnSpeak.disabled = false;
      setStatus('s-done', '✅ DONE');
      if ('vibrate' in navigator) navigator.vibrate([40, 30, 80]);
      speakResult();
    }

    function showError(msg) {
      lastText = '';
      resultLabel.textContent = 'RESULT';
      resultLabel.style.color = 'var(--pink)';
      resultText.textContent  = msg;
      resultText.classList.add('error');
      resultPopup.classList.add('show');
      btnScan.classList.add('hidden');
      btnSpeak.disabled = true;
      setStatus('s-notfound', '❌ NOT FOUND');
      if ('vibrate' in navigator) navigator.vibrate([50, 50, 50]);
    }

    function resetPopup() {
      resultPopup.classList.remove('show');
      resultText.classList.remove('error');
      btnScan.classList.remove('hidden');
      btnSpeak.disabled = false;
      btnSpeak.classList.remove('speaking');
      setStatus('s-ready', '📷 READY');
      stopSpeech();
    }

    function scanAgain() { resetPopup(); }

    // ═══════════════════════════════════════════
    // SPEECH (Web Speech API)
    // ═══════════════════════════════════════════
    function speakResult() {
      if (!lastText) return;
      stopSpeech();
      const utt   = new SpeechSynthesisUtterance(lastText);
      utt.lang    = 'en-US';
      utt.rate    = 0.88;
      utt.pitch   = 1;
      const voices = window.speechSynthesis.getVoices();
      const eng   = voices.find(v => v.lang.startsWith('en') && v.localService);
      if (eng) utt.voice = eng;
      btnSpeak.classList.add('speaking');
      utt.onend = utt.onerror = () => btnSpeak.classList.remove('speaking');
      window.speechSynthesis.speak(utt);
    }

    function stopSpeech() {
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
      btnSpeak.classList.remove('speaking');
    }

    // Preload voices
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ── Cleanup on exit ───────────────────────
    window.addEventListener('pagehide',     stopCamera);
    window.addEventListener('beforeunload', stopCamera);
    document.addEventListener('visibilitychange', () => { if (document.hidden) stopSpeech(); });
  </script>
</body>
</html>
