<!DOCTYPE html>
<!-- Mobile-first Part 1: AR Vocabulary Scanner -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Part 1 – AR Vocabulary Scanner</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    body { margin: 0; overflow: hidden; background: #000; overscroll-behavior: none; }
    a-scene { position: fixed; inset: 0; }

    .mobile-start {
      position: fixed;
      inset: 0;
      z-index: 2500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      background: radial-gradient(circle at top, rgba(0,212,255,0.16), #0a0e1a 58%);
      text-align: center;
    }
    .start-card {
      width: min(360px, 92vw);
      background: rgba(18,24,43,0.96);
      border: 1.5px solid rgba(0,212,255,0.35);
      border-radius: 24px;
      padding: 1.3rem;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
    }
    .start-title { font-size: 1.5rem; font-weight: 900; color: var(--cyan); margin-bottom: 0.35rem; }
    .start-desc { color: var(--text-muted); font-weight: 700; line-height: 1.45; font-size: 0.92rem; margin-bottom: 1rem; }
    .start-btn {
      width: 100%; padding: 0.95rem 1rem; border-radius: 999px;
      background: var(--cyan); color: #001018; font-weight: 900; font-size: 1.05rem;
    }
    .start-note { margin-top: 0.8rem; color: rgba(255,255,255,0.42); font-size: 0.72rem; font-weight: 700; }

    #loading-overlay { display: none; }
    #loading-overlay.show { display: flex; }

    #popup-word { font-size: 2.05rem; }
    #popup-phonetic {
      font-size: 0.82rem; color: var(--text-muted); font-weight: 700;
      margin-bottom: 0.25rem; font-family: var(--font-mono);
    }
    #popup-type {
      display: inline-block; font-size: 0.62rem; font-weight: 900; letter-spacing: 2px;
      text-transform: uppercase; background: rgba(0,212,255,0.15); color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.3); padding: 0.15rem 0.55rem;
      border-radius: 20px; margin-bottom: 0.5rem;
    }
    #popup-example {
      font-size: 0.82rem; color: var(--text-muted); font-weight: 700; font-style: italic;
      margin-top: 0.45rem; line-height: 1.45; border-left: 2px solid var(--cyan); padding-left: 0.7rem;
    }
    .notice-box {
      position: fixed; bottom: 2rem; left: 1rem; right: 1rem; z-index: 2600;
      display: none; background: rgba(255,59,143,0.16); border: 1.5px solid rgba(255,59,143,0.45);
      color: var(--pink); border-radius: 16px; padding: 0.9rem 1rem;
      font-size: 0.82rem; font-weight: 800; text-align: center;
    }
    .ar-popup { padding-bottom: calc(1.8rem + env(safe-area-inset-bottom)); }
  </style>
</head>
<body class="ar-page">

  <div class="mobile-start" id="mobile-start">
    <div class="start-card">
      <div class="start-title">AR Vocabulary</div>
      <p class="start-desc">Use a phone camera to scan a logo or sign. Tap start when you are ready.</p>
      <button class="start-btn" id="btn-start">📷 Start Camera</button>
      <div class="start-note">Optimized for mobile phones</div>
    </div>
  </div>

  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loading-text">Loading AR…</p>
  </div>

  <button class="ar-back-btn" onclick="goBack()">← Back</button>
  <div class="ar-status scanning" id="ar-status">TAP START</div>

  <div class="scan-hint" id="scan-hint">
    <div class="scan-frame"><div class="scan-line"></div></div>
    <p class="scan-hint-text">Point your phone at a target image</p>
  </div>

  <div class="ar-popup accent-cyan" id="ar-popup">
    <p class="popup-label">VOCABULARY FOUND</p>
    <span id="popup-type">Brand</span>
    <div class="popup-word" id="popup-word">Word</div>
    <div id="popup-phonetic"></div>
    <div id="popup-example"></div>
    <div class="popup-buttons">
      <button class="btn btn-cyan" onclick="speakCurrent()">🔊 Speak</button>
      <button class="btn btn-ghost" id="btn-again" onclick="speakCurrentAgain()">🔄 Again</button>
    </div>
  </div>

  <div class="notice-box" id="notice-box">Camera access is required. Please allow camera permission and reload.</div>

  <a-scene
    mindar-image="imageTargetSrc: ../assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.01;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: false; precision: mediump; powerPreference: high-performance"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded
    id="ar-scene"
  >
    <a-assets></a-assets>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-1"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-2"></a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-3"></a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-4"></a-entity>
    <a-entity mindar-image-target="targetIndex: 5" id="target-5"></a-entity>
    <a-entity mindar-image-target="targetIndex: 6" id="target-6"></a-entity>
    <a-entity mindar-image-target="targetIndex: 7" id="target-7"></a-entity>
    <a-entity mindar-image-target="targetIndex: 8" id="target-8"></a-entity>
    <a-entity mindar-image-target="targetIndex: 9" id="target-9"></a-entity>
  </a-scene>

  <script>
    'use strict';

    let vocabData = [];
    let currentVocab = null;
    let arStarted = false;

    const scene = document.getElementById('ar-scene');
    const startScreen = document.getElementById('mobile-start');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const arStatus = document.getElementById('ar-status');
    const scanHint = document.getElementById('scan-hint');
    const arPopup = document.getElementById('ar-popup');

    const fallbackWords = [
      "McDonald's", 'Nike', 'Coca-Cola', '7-Eleven', 'Starbucks',
      'Restroom', 'Exit', 'Warning', 'No Smoking', 'Information'
    ];

    fetch('../assets/data/vocab.json')
      .then(r => r.json())
      .then(data => {
        vocabData = data;
        for (let i = 0; i < 10; i++) {
          const item = vocabData.find(v => v.index === i);
          renderThickLabel(`target-${i}`, item ? item.word : fallbackWords[i], '#00d4ff', 3.0);
        }
      })
      .catch(() => {
        for (let i = 0; i < 10; i++) renderThickLabel(`target-${i}`, fallbackWords[i], '#00d4ff', 3.0);
      });

    function renderThickLabel(targetId, text, mainColor, width) {
      const root = document.getElementById(targetId);
      if (!root) return;
      root.innerHTML = '';

      const layers = [
        { color: '#001018', x: 0.060, y: 0.385, z: -0.070, w: width },
        { color: '#004050', x: 0.040, y: 0.405, z: -0.050, w: width },
        { color: '#ffffff', x: 0.014, y: 0.434, z: -0.018, w: width * 1.01, opacity: 0.45 },
        { color: mainColor, x: 0, y: 0.455, z: 0, w: width }
      ];

      layers.forEach(layer => {
        const t = document.createElement('a-text');
        t.setAttribute('value', text);
        t.setAttribute('align', 'center');
        t.setAttribute('baseline', 'center');
        t.setAttribute('color', layer.color);
        t.setAttribute('width', layer.w);
        t.setAttribute('position', `${layer.x} ${layer.y} ${layer.z}`);
        t.setAttribute('font', 'https://cdn.aframe.io/fonts/Exo2Bold.fnt');
        if (layer.opacity) t.setAttribute('opacity', layer.opacity);
        root.appendChild(t);
      });
    }

    document.getElementById('btn-start').addEventListener('click', startAR);

    async function startAR() {
      if (arStarted) return;
      arStarted = true;
      warmupSpeech();
      startScreen.style.display = 'none';
      loadingOverlay.classList.add('show');
      loadingText.textContent = 'Starting camera…';
      arStatus.textContent = 'STARTING';

      try {
        const arSystem = scene.systems['mindar-image-system'];
        if (!arSystem) throw new Error('MindAR system is not ready yet.');
        await arSystem.start();
      } catch (err) {
        console.error('[Part1] AR start error:', err);
        loadingText.textContent = 'Camera error. Please allow camera access.';
        document.getElementById('notice-box').style.display = 'block';
        arStarted = false;
      }
    }

    scene.addEventListener('arReady', () => {
      loadingOverlay.classList.remove('show');
      arStatus.textContent = 'SCANNING';
      arStatus.className = 'ar-status scanning';
    });

    scene.addEventListener('arError', err => {
      console.error('[Part1] AR Error:', err);
      loadingText.textContent = 'Camera error. Please allow camera access.';
      loadingOverlay.classList.add('show');
      document.getElementById('notice-box').style.display = 'block';
    });

    scene.addEventListener('loaded', () => {
      for (let i = 0; i < 10; i++) {
        const entity = document.getElementById(`target-${i}`);
        if (!entity) continue;
        entity.addEventListener('targetFound', () => showVocabPopup(i));
        entity.addEventListener('targetLost', hideVocabPopup);
      }
    });

    function showVocabPopup(targetIndex) {
      const vocab = vocabData.find(v => v.index === targetIndex) || {
        word: fallbackWords[targetIndex], phonetic: '', type: 'Vocabulary', example: ''
      };
      currentVocab = vocab;

      document.getElementById('popup-word').textContent = vocab.word;
      document.getElementById('popup-phonetic').textContent = vocab.phonetic || '';
      document.getElementById('popup-type').textContent = vocab.type || 'Vocabulary';
      document.getElementById('popup-example').textContent = vocab.example || '';

      arPopup.classList.add('show');
      scanHint.classList.add('hidden');
      arStatus.textContent = 'FOUND';
      arStatus.className = 'ar-status found';
      speakCurrent();
      vibrate(50);
    }

    function hideVocabPopup() {
      currentVocab = null;
      arPopup.classList.remove('show');
      scanHint.classList.remove('hidden');
      arStatus.textContent = 'SCANNING';
      arStatus.className = 'ar-status scanning';
      stopSpeech();
    }

    function speakCurrent() {
      if (currentVocab) speak(currentVocab.word);
    }

    function speakCurrentAgain() {
      speakCurrent();
      const btn = document.getElementById('btn-again');
      btn.textContent = '✓ Speaking…';
      setTimeout(() => { btn.textContent = '🔄 Again'; }, 1200);
    }

    function speak(text) {
      if (!('speechSynthesis' in window) || !text) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.86;
      utt.pitch = 1;
      const voices = window.speechSynthesis.getVoices();
      const voice = voices.find(v => v.lang === 'en-US' && v.localService) || voices.find(v => v.lang && v.lang.startsWith('en'));
      if (voice) utt.voice = voice;
      window.speechSynthesis.speak(utt);
    }

    function warmupSpeech() {
      if ('speechSynthesis' in window) window.speechSynthesis.getVoices();
    }

    function stopSpeech() {
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    function goBack() {
      stopSpeech();
      const sys = scene.systems && scene.systems['mindar-image-system'];
      if (sys && arStarted) sys.stop();
      window.location = '../';
    }
  </script>
</body>
</html>
