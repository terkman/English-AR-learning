<!DOCTYPE html>
<!-- v1.0 - Part 1: AR Vocabulary Scanner -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Part 1 – AR Vocabulary Scanner</title>

  <!-- A-Frame (3D/AR engine) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <!-- MindAR (Image Tracking) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    /* Part 1 specific overrides */
    body { margin: 0; overflow: hidden; background: #000; }

    /* A-Frame scene takes full screen */
    a-scene { position: fixed; inset: 0; }

    /* Word display in popup */
    #popup-word   { font-size: 2.4rem; }
    #popup-phonetic {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 0.3rem;
      font-family: var(--font-mono);
    }
    #popup-type {
      display: inline-block;
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(0,212,255,0.15);
      color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.3);
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      margin-bottom: 0.6rem;
    }
    #popup-example {
      font-size: 0.82rem;
      color: var(--text-muted);
      font-weight: 600;
      font-style: italic;
      margin-top: 0.5rem;
      line-height: 1.5;
      border-left: 2px solid var(--cyan);
      padding-left: 0.7rem;
    }

    /* Permission / Error notice */
    .notice-box {
      position: fixed;
      bottom: 2rem;
      left: 1rem; right: 1rem;
      background: rgba(255,59,143,0.15);
      border: 1.5px solid rgba(255,59,143,0.4);
      border-radius: var(--r);
      padding: 0.9rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--pink);
      z-index: 2000;
      display: none;
    }

    /* AR Text overlay entities styled via A-Frame primitives */
  </style>
</head>
<body class="ar-page">

  <!-- ── Loading overlay ───────────────────── -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loading-text">Starting camera…</p>
  </div>

  <!-- ── Back button ───────────────────────── -->
  <button class="ar-back-btn" onclick="window.location='../'">← Back</button>

  <!-- ── AR Status badge ───────────────────── -->
  <div class="ar-status scanning" id="ar-status">🔍 SCANNING</div>

  <!-- ── Scan frame hint ───────────────────── -->
  <div class="scan-hint" id="scan-hint">
    <div class="scan-frame">
      <div class="scan-line"></div>
    </div>
    <p class="scan-hint-text">Point camera at a target image</p>
  </div>

  <!-- ── Vocabulary popup (slides up when target found) ── -->
  <div class="ar-popup accent-cyan" id="ar-popup">
    <p class="popup-label">VOCABULARY FOUND</p>
    <span id="popup-type">Brand</span>
    <div class="popup-word" id="popup-word">McDonald's</div>
    <div id="popup-phonetic">/ˌmækˈdɒnəldz/</div>
    <div id="popup-example">Let's have lunch at McDonald's!</div>

    <div class="popup-buttons">
      <!-- Speak button: reads the word aloud -->
      <button class="btn btn-cyan" id="btn-speak" onclick="speakCurrent()">
        🔊 Speak
      </button>
      <!-- Speak Again: same as Speak but with visual feedback -->
      <button class="btn btn-ghost" id="btn-again" onclick="speakCurrentAgain()">
        🔄 Again
      </button>
    </div>
  </div>

  <!-- ── Camera error notice ───────────────── -->
  <div class="notice-box" id="notice-box">
    📷 Camera access required. Please allow camera permission and reload.
  </div>

  <!-- ═══════════════════════════════════════════
       A-Frame AR Scene
       targets.mind is your compiled MindAR target file.
       Place it at: assets/targets/targets.mind
       ═══════════════════════════════════════════ -->
  <a-scene
    mindar-image="imageTargetSrc: ../assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="ar-scene"
  >
    <a-assets></a-assets>

    <!-- Camera entity -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!--
      Target entities — one per vocabulary item.
      Each entity has targetIndex matching the order images were compiled into targets.mind.
      The a-text shows the word above the detected target in AR space.
    -->

    <!-- Index 0: McDonald's -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-0">
      <a-text value="McDonald's" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.8" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 1: Nike -->
    <a-entity mindar-image-target="targetIndex: 1" id="target-1">
      <a-text value="Nike" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.2" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 2: Coca-Cola -->
    <a-entity mindar-image-target="targetIndex: 2" id="target-2">
      <a-text value="Coca-Cola" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.8" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 3: 7-Eleven -->
    <a-entity mindar-image-target="targetIndex: 3" id="target-3">
      <a-text value="7-Eleven" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.6" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 4: Starbucks -->
    <a-entity mindar-image-target="targetIndex: 4" id="target-4">
      <a-text value="Starbucks" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.8" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 5: Restroom -->
    <a-entity mindar-image-target="targetIndex: 5" id="target-5">
      <a-text value="Restroom" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.7" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 6: Exit -->
    <a-entity mindar-image-target="targetIndex: 6" id="target-6">
      <a-text value="Exit" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.1" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 7: Warning -->
    <a-entity mindar-image-target="targetIndex: 7" id="target-7">
      <a-text value="Warning" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="1.5" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 8: No Smoking -->
    <a-entity mindar-image-target="targetIndex: 8" id="target-8">
      <a-text value="No Smoking" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="2.0" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

    <!-- Index 9: Information -->
    <a-entity mindar-image-target="targetIndex: 9" id="target-9">
      <a-text value="Information" color="#00d4ff" align="center"
        width="1.8" position="0 0.3 0" font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
      <a-plane color="#0a0e1a" opacity="0.75" width="2.2" height="0.2" position="0 0.3 -0.01"></a-plane>
    </a-entity>

  </a-scene>

  <!-- ─────────────────────────────────────────
       JavaScript
       ───────────────────────────────────────── -->
  <script>
    'use strict';

    // ── Vocabulary data (loaded from JSON) ───
    let vocabData = [];
    let currentVocab = null; // currently detected vocab item

    // ── Load vocab JSON ──────────────────────
    fetch('../assets/data/vocab.json')
      .then(r => r.json())
      .then(data => {
        vocabData = data;
        console.log('[Part1] Vocab data loaded:', data.length, 'items');
      })
      .catch(err => console.error('[Part1] Failed to load vocab.json', err));

    // ── DOM references ───────────────────────
    const scene         = document.getElementById('ar-scene');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText   = document.getElementById('loading-text');
    const arStatus      = document.getElementById('ar-status');
    const scanHint      = document.getElementById('scan-hint');
    const arPopup       = document.getElementById('ar-popup');

    // ── Start AR when scene is ready ─────────
    scene.addEventListener('arReady', () => {
      console.log('[Part1] AR Ready');
      loadingOverlay.classList.add('hidden');
      arStatus.textContent = '🔍 SCANNING';
      arStatus.className = 'ar-status scanning';
    });

    scene.addEventListener('arError', (err) => {
      console.error('[Part1] AR Error:', err);
      loadingText.textContent = 'Camera error. Please allow camera access.';
      document.getElementById('notice-box').style.display = 'block';
    });

    // Wait for A-Frame and MindAR to be ready, then start
    scene.addEventListener('loaded', () => {
      loadingText.textContent = 'Loading AR engine…';
      const arSystem = scene.systems['mindar-image-system'];
      if (arSystem) {
        // Start with a small delay to ensure everything is ready
        setTimeout(() => {
          arSystem.start();
        }, 300);
      }
    });

    // ── Attach targetFound / targetLost events to each entity ──
    // We do this after the scene loads so entities exist
    scene.addEventListener('loaded', () => {
      for (let i = 0; i < 10; i++) {
        const entity = document.getElementById(`target-${i}`);
        if (!entity) continue;

        // Capture i in closure
        const idx = i;

        entity.addEventListener('targetFound', () => {
          console.log('[Part1] Target found:', idx);
          showVocabPopup(idx);
        });

        entity.addEventListener('targetLost', () => {
          console.log('[Part1] Target lost:', idx);
          hideVocabPopup();
        });
      }
    });

    // ── Show vocabulary popup ────────────────
    function showVocabPopup(targetIndex) {
      // Find vocab data for this index
      const vocab = vocabData.find(v => v.index === targetIndex);
      if (!vocab) return;

      currentVocab = vocab;

      // Update popup content
      document.getElementById('popup-word').textContent     = vocab.word;
      document.getElementById('popup-phonetic').textContent = vocab.phonetic;
      document.getElementById('popup-type').textContent     = vocab.type;
      document.getElementById('popup-example').textContent  = vocab.example;

      // Show popup
      arPopup.classList.add('show');
      scanHint.classList.add('hidden');

      // Update status
      arStatus.textContent  = '✅ FOUND';
      arStatus.className    = 'ar-status found';

      // Auto-speak the word
      speakCurrent();

      // Haptic
      if ('vibrate' in navigator) navigator.vibrate(60);
    }

    // ── Hide popup ───────────────────────────
    function hideVocabPopup() {
      currentVocab = null;
      arPopup.classList.remove('show');
      scanHint.classList.remove('hidden');
      arStatus.textContent = '🔍 SCANNING';
      arStatus.className   = 'ar-status scanning';
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // ── Speech functions ─────────────────────
    function speakCurrent() {
      if (!currentVocab) return;
      speak(currentVocab.word);
    }

    function speakCurrentAgain() {
      speakCurrent();
      // Button feedback
      const btn = document.getElementById('btn-again');
      btn.textContent = '✓ Speaking…';
      setTimeout(() => { btn.textContent = '🔄 Again'; }, 1500);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) {
        alert('Text-to-speech is not supported on this device.');
        return;
      }
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang  = 'en-US';
      utt.rate  = 0.85;
      utt.pitch = 1;
      const voices = window.speechSynthesis.getVoices();
      const engVoice = voices.find(v => v.lang.startsWith('en') && v.localService);
      if (engVoice) utt.voice = engVoice;
      window.speechSynthesis.speak(utt);
    }

    // Pre-load voices (Chrome requires this)
    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
