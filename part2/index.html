<!DOCTYPE html>
<!-- v1.0 - Part 2: AR Open Question -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Part 2 – AR Open Question</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    body { margin: 0; overflow: hidden; background: #000; }
    a-scene { position: fixed; inset: 0; }

    /* Question popup styling */
    #popup-target-name {
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--yellow);
      margin-bottom: 0.3rem;
    }
    #popup-question {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text-white);
      line-height: 1.45;
      margin: 0.7rem 0;
      min-height: 3rem;
    }
    #popup-question-num {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .q-mark {
      font-size: 3rem;
      position: absolute;
      top: -0.8rem;
      right: 1rem;
      opacity: 0.08;
      font-family: var(--font-mono);
      font-weight: 900;
      pointer-events: none;
    }
    /* Animate question change */
    .question-fade {
      animation: qfade 0.3s ease;
    }
    @keyframes qfade {
      0%   { opacity: 0; transform: translateY(6px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="ar-page">

  <!-- ── Loading overlay ───────────────────── -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loading-text">Starting camera…</p>
  </div>

  <!-- ── Back button ───────────────────────── -->
  <button class="ar-back-btn" onclick="window.location='../'">← Back</button>

  <!-- ── AR Status badge ───────────────────── -->
  <div class="ar-status scanning" id="ar-status">🔍 SCANNING</div>

  <!-- ── Scan frame hint ───────────────────── -->
  <div class="scan-hint" id="scan-hint">
    <div class="scan-frame" style="border-color: rgba(255,214,10,0.4);">
      <div class="scan-line" style="background: linear-gradient(90deg, transparent, #ffd60a, transparent);"></div>
    </div>
    <p class="scan-hint-text">Scan a target to get a question</p>
  </div>

  <!-- ── Question popup ───────────────────── -->
  <div class="ar-popup accent-yellow" id="ar-popup">
    <span class="q-mark">?</span>
    <p class="popup-label">OPEN QUESTION</p>
    <div id="popup-target-name">McDonald's</div>
    <div id="popup-question-num">Question 1 of 7</div>
    <div id="popup-question">What do you usually order here?</div>

    <div class="popup-buttons">
      <!-- Read question aloud -->
      <button class="btn btn-yellow" id="btn-speak" onclick="speakQuestion()">
        🔊 Read
      </button>
      <!-- Get a new random question for this target -->
      <button class="btn btn-ghost" id="btn-new" onclick="nextQuestion()">
        🎲 New Question
      </button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       A-Frame AR Scene
       ═══════════════════════════════════════════ -->
  <a-scene
    mindar-image="imageTargetSrc: ../assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="ar-scene"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!--
      AR text shown above each detected target.
      Shows a "?" symbol to hint at the question feature.
    -->

    <a-entity mindar-image-target="targetIndex: 0" id="target-0">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-1">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-2">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-3">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-4">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 5" id="target-5">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 6" id="target-6">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 7" id="target-7">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 8" id="target-8">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
    <a-entity mindar-image-target="targetIndex: 9" id="target-9">
      <a-text value="?" color="#ffd60a" align="center" width="2.5" position="0 0.35 0"
        font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"></a-text>
    </a-entity>
  </a-scene>

  <script>
    'use strict';

    // ── Question data & state ────────────────
    let questionsData = [];
    let currentTarget = null; // { targetIndex, target, questions }
    let currentQIndex = 0;    // index of current question in the array

    // Shuffle array helper (Fisher-Yates)
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ── Load questions JSON ──────────────────
    fetch('../assets/data/questions.json')
      .then(r => r.json())
      .then(data => {
        questionsData = data;
        console.log('[Part2] Questions loaded:', data.length, 'targets');
      })
      .catch(err => console.error('[Part2] Failed to load questions.json', err));

    // ── DOM refs ─────────────────────────────
    const scene          = document.getElementById('ar-scene');
    const loadingOverlay = document.getElementById('loading-overlay');
    const arStatus       = document.getElementById('ar-status');
    const scanHint       = document.getElementById('scan-hint');
    const arPopup        = document.getElementById('ar-popup');

    // ── AR lifecycle ─────────────────────────
    scene.addEventListener('arReady', () => {
      loadingOverlay.classList.add('hidden');
    });
    scene.addEventListener('loaded', () => {
      document.getElementById('loading-text').textContent = 'Loading AR engine…';
      const sys = scene.systems['mindar-image-system'];
      if (sys) setTimeout(() => sys.start(), 300);

      // Attach target events
      for (let i = 0; i < 10; i++) {
        const el  = document.getElementById(`target-${i}`);
        if (!el) continue;
        const idx = i;
        el.addEventListener('targetFound', () => showQuestion(idx));
        el.addEventListener('targetLost',  () => hideQuestion());
      }
    });

    // ── Show question for detected target ────
    function showQuestion(targetIndex) {
      const data = questionsData.find(d => d.targetIndex === targetIndex);
      if (!data) return;

      // Shuffle questions when a new target is detected
      currentTarget = {
        ...data,
        shuffled: shuffle(data.questions),
        currentIdx: 0
      };

      displayCurrentQuestion();

      arPopup.classList.add('show');
      scanHint.classList.add('hidden');
      arStatus.textContent = '✅ FOUND';
      arStatus.className   = 'ar-status found';

      // Auto-read the question
      speakQuestion();

      if ('vibrate' in navigator) navigator.vibrate(60);
    }

    // ── Display current question ─────────────
    function displayCurrentQuestion() {
      if (!currentTarget) return;
      const { shuffled, currentIdx, target } = currentTarget;
      const question = shuffled[currentIdx];

      document.getElementById('popup-target-name').textContent = target;
      document.getElementById('popup-question').textContent    = question;
      document.getElementById('popup-question-num').textContent =
        `Question ${currentIdx + 1} of ${shuffled.length}`;

      // Fade animation
      const qEl = document.getElementById('popup-question');
      qEl.classList.remove('question-fade');
      void qEl.offsetWidth; // reflow to restart animation
      qEl.classList.add('question-fade');
    }

    // ── Next question (no repeats until all seen) ──
    function nextQuestion() {
      if (!currentTarget) return;
      const { shuffled } = currentTarget;

      currentTarget.currentIdx++;
      // If we've gone through all questions, reshuffle and restart
      if (currentTarget.currentIdx >= shuffled.length) {
        currentTarget.shuffled = shuffle(currentTarget.shuffled);
        currentTarget.currentIdx = 0;
      }

      displayCurrentQuestion();
      speakQuestion();

      if ('vibrate' in navigator) navigator.vibrate(30);
    }

    // ── Hide popup ───────────────────────────
    function hideQuestion() {
      currentTarget = null;
      arPopup.classList.remove('show');
      scanHint.classList.remove('hidden');
      arStatus.textContent = '🔍 SCANNING';
      arStatus.className   = 'ar-status scanning';
      if ('speechSynthesis' in window) window.speechSynthesis.cancel();
    }

    // ── Speak the current question ───────────
    function speakQuestion() {
      if (!currentTarget) return;
      const question = currentTarget.shuffled[currentTarget.currentIdx];
      speak(question);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const utt   = new SpeechSynthesisUtterance(text);
      utt.lang    = 'en-US';
      utt.rate    = 0.88;
      utt.pitch   = 1;
      const voices = window.speechSynthesis.getVoices();
      const eng   = voices.find(v => v.lang.startsWith('en') && v.localService);
      if (eng) utt.voice = eng;
      window.speechSynthesis.speak(utt);
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
