<!DOCTYPE html>
<!-- Part 2: AR Question - Reliable mobile overlay locked version -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Part 2 – AR Question</title>

  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,214,10,0.18), transparent 35%),
        #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      text-align: center;
    }

    .start-card {
      width: min(92vw, 420px);
      background: rgba(18,24,43,0.94);
      border: 1.5px solid rgba(255,214,10,0.28);
      border-radius: 26px;
      padding: 1.4rem;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }

    .start-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--yellow);
      margin-bottom: 0.4rem;
    }

    .start-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 1.1rem;
    }

    .start-btn {
      width: 100%;
      border-radius: 999px;
      padding: 0.95rem 1.2rem;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 900;
      background: var(--yellow);
      color: #171100;
      border: none;
      cursor: pointer;
    }

    .start-note {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 700;
    }

    .hidden { display: none !important; }

    /* Visible question. This is HTML overlay, so it will not disappear when MindAR tracking flickers. */
    .question-ar-overlay {
      position: fixed;
      left: 50%;
      top: 24%;
      transform: translate(-50%, -50%);
      width: min(92vw, 680px);
      z-index: 980;
      pointer-events: none;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .question-ar-overlay.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .question-3d-text {
      display: inline-block;
      max-width: 100%;
      color: #ffd60a;
      font-family: var(--font-main);
      font-weight: 900;
      line-height: 0.98;
      letter-spacing: -0.04em;
      white-space: normal;
      overflow: hidden;
      text-shadow:
        1px 1px 0 #d2a900,
        2px 2px 0 #b58d00,
        3px 3px 0 #806200,
        4px 4px 0 #4b3a00,
        5px 5px 8px rgba(0,0,0,0.45),
        0 0 10px rgba(255,214,10,0.35);
      -webkit-text-stroke: 1px rgba(255, 245, 150, 0.35);
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.35));
    }

    .question-3d-text.two-lines { line-height: 1.02; }

    #popup-target-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1.05;
      margin: 0.2rem 0 0.8rem;
    }

    .ar-popup {
      padding-bottom: 1.5rem;
      border-top-color: var(--yellow);
    }

    .popup-buttons { margin-top: 0.3rem; }

    .notice-box {
      position: fixed;
      bottom: 2rem;
      left: 1rem;
      right: 1rem;
      background: rgba(255,59,143,0.16);
      border: 1.5px solid rgba(255,59,143,0.42);
      border-radius: 16px;
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--pink);
      z-index: 2600;
      display: none;
      line-height: 1.45;
    }

    @media (max-width: 420px) {
      .question-ar-overlay {
        top: 25%;
        width: 94vw;
      }

      #popup-target-name { font-size: 1.65rem; }

      .ar-popup { padding: 1rem 1rem 1.35rem; }
    }
  </style>
</head>

<body class="ar-page">

  <div class="start-screen" id="start-screen">
    <div class="start-card">
      <div class="start-title">AR Question</div>
      <div class="start-desc">
        Point your phone camera at a logo or sign.<br>
        A question will appear and stay.
      </div>
      <button class="start-btn" id="start-btn" type="button">📷 Start Camera</button>
      <div class="start-note">Best on mobile Chrome · Please allow camera permission</div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="loading-spinner" style="border-top-color: var(--yellow);"></div>
    <p class="loading-text" id="loading-text">Starting camera…</p>
  </div>

  <button class="ar-back-btn" type="button" onclick="window.location='../'">← Back</button>
  <div class="ar-status scanning" id="ar-status">READY</div>

  <div class="scan-hint hidden" id="scan-hint">
    <div class="scan-frame" style="border-color: rgba(255,214,10,0.4);">
      <div class="scan-line" style="background: linear-gradient(90deg, transparent, #ffd60a, transparent);"></div>
    </div>
    <p class="scan-hint-text">Point camera at a target image</p>
  </div>

  <div class="question-ar-overlay" id="question-ar-overlay">
    <div class="question-3d-text" id="question-3d-text"></div>
  </div>

  <div class="ar-popup accent-yellow" id="ar-popup">
    <p class="popup-label">QUESTION</p>
    <div id="popup-target-name">Coca-Cola</div>
    <div class="popup-buttons">
      <button class="btn btn-yellow" id="btn-speak" type="button" onclick="speakQuestion()">🔊 Read</button>
    </div>
  </div>

  <div class="notice-box" id="notice-box">
    📷 Camera access required. Please allow camera permission and reload.
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ../assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; precision: highp; powerPreference: high-performance;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="ar-scene"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-1"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-2"></a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-3"></a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-4"></a-entity>
    <a-entity mindar-image-target="targetIndex: 5" id="target-5"></a-entity>
    <a-entity mindar-image-target="targetIndex: 6" id="target-6"></a-entity>
    <a-entity mindar-image-target="targetIndex: 7" id="target-7"></a-entity>
    <a-entity mindar-image-target="targetIndex: 8" id="target-8"></a-entity>
    <a-entity mindar-image-target="targetIndex: 9" id="target-9"></a-entity>
  </a-scene>

  <script>
    'use strict';

    let questionsData = [];
    let currentTarget = null;
    let sceneLoaded = false;
    let arStarted = false;
    let locked = false;

    const scene = document.getElementById('ar-scene');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const arStatus = document.getElementById('ar-status');
    const scanHint = document.getElementById('scan-hint');
    const arPopup = document.getElementById('ar-popup');
    const noticeBox = document.getElementById('notice-box');
    const questionOverlay = document.getElementById('question-ar-overlay');
    const questionTextEl = document.getElementById('question-3d-text');

    fetch('../assets/data/questions.json')
      .then(r => {
        if (!r.ok) throw new Error('questions.json not found');
        return r.json();
      })
      .then(data => {
        questionsData = data;
      })
      .catch(err => {
        console.error('[Part2] Failed to load questions.json:', err);
        noticeBox.textContent = '⚠️ Cannot load questions.json. Please check assets/data/questions.json';
        noticeBox.style.display = 'block';
      });

    scene.addEventListener('loaded', () => {
      sceneLoaded = true;
      attachTargetEvents();
    });

    scene.addEventListener('arReady', () => {
      loadingOverlay.classList.add('hidden');
      scanHint.classList.remove('hidden');
      arStatus.textContent = 'SCANNING';
      arStatus.className = 'ar-status scanning';
    });

    scene.addEventListener('arError', err => {
      console.error('[Part2] AR Error:', err);
      loadingText.textContent = 'Camera error. Please allow camera access.';
      noticeBox.style.display = 'block';
    });

    startBtn.addEventListener('click', startAR);

    function startAR() {
      if (arStarted) return;
      arStarted = true;

      startScreen.classList.add('hidden');
      loadingOverlay.classList.remove('hidden');
      loadingText.textContent = 'Loading AR engine…';
      arStatus.textContent = 'LOADING';

      const tryStart = () => {
        const sys = scene.systems && scene.systems['mindar-image-system'];
        if (!sceneLoaded || !sys) {
          setTimeout(tryStart, 120);
          return;
        }

        sys.start().catch(err => {
          console.error('[Part2] Failed to start AR:', err);
          loadingText.textContent = 'Cannot start camera. Please allow camera access.';
          noticeBox.style.display = 'block';
        });
      };

      tryStart();
    }

    function attachTargetEvents() {
      for (let i = 0; i < 10; i++) {
        const entity = document.getElementById(`target-${i}`);
        if (!entity) continue;

        entity.addEventListener('targetFound', () => lockQuestionFromTarget(i));
        entity.addEventListener('targetLost', () => {});
      }
    }

    function randomQuestion(data) {
      const index = Math.floor(Math.random() * data.questions.length);
      return data.questions[index];
    }

    function lockQuestionFromTarget(targetIndex) {
      if (locked) return;

      const data = questionsData.find(d => d.targetIndex === targetIndex);
      if (!data) return;

      const question = randomQuestion(data);

      locked = true;
      currentTarget = { targetIndex, target: data.target, question };

      document.getElementById('popup-target-name').textContent = data.target;
      renderQuestionOverlay(question);

      arPopup.classList.add('show');
      scanHint.classList.add('hidden');
      questionOverlay.classList.add('show');

      arStatus.textContent = 'LOCKED';
      arStatus.className = 'ar-status found';

      speakQuestion();

      if ('vibrate' in navigator) navigator.vibrate([45, 30, 45]);
    }

    function makeTwoLines(text) {
      const clean = text.replace(/\s+/g, ' ').trim();
      const words = clean.split(' ');

      if (clean.length <= 22) return [clean];

      let best = null;
      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const longest = Math.max(a.length, b.length);
        const balance = Math.abs(a.length - b.length);
        const score = longest * 3 + balance;

        if (!best || score < best.score) best = { lines: [a, b], score };
      }
      return best ? best.lines : [clean];
    }

    function fontSizeForLines(lines) {
      const longest = Math.max(...lines.map(line => line.length));
      if (longest > 42) return 'clamp(20px, 5.0vw, 34px)';
      if (longest > 36) return 'clamp(22px, 5.4vw, 38px)';
      if (longest > 30) return 'clamp(24px, 5.8vw, 42px)';
      if (longest > 24) return 'clamp(26px, 6.4vw, 48px)';
      if (longest > 18) return 'clamp(30px, 7.2vw, 56px)';
      return 'clamp(34px, 8.2vw, 64px)';
    }

    function renderQuestionOverlay(question) {
      const lines = makeTwoLines(question);
      questionTextEl.innerHTML = lines.map(line => escapeHtml(line)).join('<br>');
      questionTextEl.classList.toggle('two-lines', lines.length === 2);
      questionTextEl.style.fontSize = fontSizeForLines(lines);

      if (window.innerHeight < 720) questionOverlay.style.top = '22%';
      else questionOverlay.style.top = '24%';
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function speakQuestion() {
      if (!currentTarget) return;
      speak(currentTarget.question);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();

      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.88;
      utt.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const engVoice = voices.find(v => v.lang.startsWith('en') && v.localService);
      if (engVoice) utt.voice = engVoice;

      window.speechSynthesis.speak(utt);
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
