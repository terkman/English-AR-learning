<!DOCTYPE html>
<!-- Part 2: AR Question - Pre-rendered Text3D like Part 1 -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Part 2 – AR Question</title>

  <!-- A-Frame + MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- 3D extruded text for A-Frame -->
  <script src="https://unpkg.com/aframe-text-geometry-component@0.5.2/dist/aframe-text-geometry-component.min.js"></script>

  <link rel="stylesheet" href="../style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Space+Mono:wght@700&display=swap" rel="stylesheet" />

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
    }

    a-scene {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    .start-screen {
      position: fixed;
      inset: 0;
      z-index: 2500;
      background:
        radial-gradient(circle at 50% 25%, rgba(255,214,10,0.18), transparent 35%),
        #0a0e1a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.2rem;
      text-align: center;
    }

    .start-card {
      width: min(92vw, 420px);
      background: rgba(18,24,43,0.94);
      border: 1.5px solid rgba(255,214,10,0.28);
      border-radius: 26px;
      padding: 1.4rem;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
    }

    .start-title {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--yellow);
      margin-bottom: 0.4rem;
    }

    .start-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 700;
      line-height: 1.5;
      margin-bottom: 1.1rem;
    }

    .start-btn {
      width: 100%;
      border-radius: 999px;
      padding: 0.95rem 1.2rem;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 900;
      background: var(--yellow);
      color: #171100;
      border: none;
      cursor: pointer;
    }

    .start-note {
      margin-top: 0.75rem;
      font-size: 0.72rem;
      color: var(--text-dim);
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    #popup-target-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1.08;
      margin: 0.2rem 0 0.8rem;
    }

    .ar-popup {
      padding-bottom: 1.5rem;
      border-top-color: var(--yellow);
    }

    .popup-buttons {
      margin-top: 0.3rem;
    }

    .notice-box {
      position: fixed;
      bottom: 2rem;
      left: 1rem;
      right: 1rem;
      background: rgba(255,59,143,0.16);
      border: 1.5px solid rgba(255,59,143,0.42);
      border-radius: 16px;
      padding: 0.9rem 1rem;
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--pink);
      z-index: 2600;
      display: none;
      line-height: 1.45;
    }

    @media (max-width: 420px) {
      #popup-target-name {
        font-size: 1.65rem;
      }

      .ar-popup {
        padding: 1rem 1rem 1.35rem;
      }
    }
  </style>
</head>

<body class="ar-page">

  <div class="start-screen" id="start-screen">
    <div class="start-card">
      <div class="start-title">AR Question</div>
      <div class="start-desc">
        Point your phone camera at a logo or sign.<br>
        The question follows the tracked image.
      </div>
      <button class="start-btn" id="start-btn" type="button">📷 Start Camera</button>
      <div class="start-note">Best on mobile Chrome · Please allow camera permission</div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loading-overlay">
    <div class="loading-spinner" style="border-top-color: var(--yellow);"></div>
    <p class="loading-text" id="loading-text">Starting camera…</p>
  </div>

  <button class="ar-back-btn" type="button" onclick="window.location='../'">← Back</button>

  <div class="ar-status scanning" id="ar-status">READY</div>

  <div class="scan-hint hidden" id="scan-hint">
    <div class="scan-frame" style="border-color: rgba(255,214,10,0.4);">
      <div class="scan-line" style="background: linear-gradient(90deg, transparent, #ffd60a, transparent);"></div>
    </div>
    <p class="scan-hint-text">Point camera at a target image</p>
  </div>

  <!-- Popup bottom: no question text here -->
  <div class="ar-popup accent-yellow" id="ar-popup">
    <p class="popup-label">QUESTION</p>
    <div id="popup-target-name">Coca-Cola</div>

    <div class="popup-buttons">
      <button class="btn btn-yellow" id="btn-speak" type="button" onclick="speakQuestion()">
        🔊 Read
      </button>
    </div>
  </div>

  <div class="notice-box" id="notice-box">
    📷 Camera access required. Please allow camera permission and reload.
  </div>

  <a-scene
    mindar-image="imageTargetSrc: ../assets/targets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.001;"
    color-space="sRGB"
    renderer="colorManagement: true; antialias: true; precision: highp; powerPreference: high-performance;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="ar-scene"
  >
    <a-assets>
      <a-asset-item
        id="font-bold"
        src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r147/examples/fonts/helvetiker_bold.typeface.json">
      </a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" color="#ffffff" intensity="0.9"></a-light>
    <a-light type="directional" color="#ffffff" intensity="1.2" position="0.5 1 1"></a-light>

    <!-- Targets. Text3D is pre-rendered into each target like Part 1. -->
    <a-entity mindar-image-target="targetIndex: 0" id="target-0"></a-entity>
    <a-entity mindar-image-target="targetIndex: 1" id="target-1"></a-entity>
    <a-entity mindar-image-target="targetIndex: 2" id="target-2"></a-entity>
    <a-entity mindar-image-target="targetIndex: 3" id="target-3"></a-entity>
    <a-entity mindar-image-target="targetIndex: 4" id="target-4"></a-entity>
    <a-entity mindar-image-target="targetIndex: 5" id="target-5"></a-entity>
    <a-entity mindar-image-target="targetIndex: 6" id="target-6"></a-entity>
    <a-entity mindar-image-target="targetIndex: 7" id="target-7"></a-entity>
    <a-entity mindar-image-target="targetIndex: 8" id="target-8"></a-entity>
    <a-entity mindar-image-target="targetIndex: 9" id="target-9"></a-entity>
  </a-scene>

  <script>
    'use strict';

    AFRAME.registerComponent('center-3d-text', {
      init: function () {
        this.center = this.center.bind(this);
        this.el.addEventListener('object3dset', this.center);
        setTimeout(this.center, 250);
        setTimeout(this.center, 700);
        setTimeout(this.center, 1200);
      },
      center: function () {
        const mesh = this.el.getObject3D('mesh');
        if (!mesh || !mesh.geometry) return;

        mesh.geometry.computeBoundingBox();
        const box = mesh.geometry.boundingBox;
        if (!box) return;

        const xOffset = -0.5 * (box.max.x - box.min.x) - box.min.x;
        const yOffset = -0.5 * (box.max.y - box.min.y) - box.min.y;

        mesh.geometry.translate(xOffset, yOffset, 0);
        mesh.geometry.computeBoundingBox();
      }
    });

    AFRAME.registerComponent('fit-3d-question', {
      schema: {
        maxWidth: { type: 'number', default: 1.05 },
        maxHeight: { type: 'number', default: 0.36 }
      },
      init: function () {
        this.fit = this.fit.bind(this);
        setTimeout(this.fit, 350);
        setTimeout(this.fit, 850);
        setTimeout(this.fit, 1400);
      },
      fit: function () {
        const obj = this.el.object3D;
        if (!obj || !window.THREE) return;

        obj.scale.set(1, 1, 1);

        const box = new THREE.Box3().setFromObject(obj);
        if (!box || box.isEmpty()) return;

        const size = new THREE.Vector3();
        box.getSize(size);
        if (!size.x || !size.y) return;

        const sx = this.data.maxWidth / size.x;
        const sy = this.data.maxHeight / size.y;
        const s = Math.min(sx, sy, 1);

        obj.scale.setScalar(s);
      }
    });

    let questionsData = [];
    let currentTarget = null;
    let sceneLoaded = false;
    let arStarted = false;

    const scene = document.getElementById('ar-scene');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const loadingOverlay = document.getElementById('loading-overlay');
    const loadingText = document.getElementById('loading-text');
    const arStatus = document.getElementById('ar-status');
    const scanHint = document.getElementById('scan-hint');
    const arPopup = document.getElementById('ar-popup');
    const noticeBox = document.getElementById('notice-box');

    // Locked question per target. New questions only after page reload / re-enter Part 2.
    const lockedQuestions = {};
    const spokenTargets = {};
    const hideTimers = {};

    fetch('../assets/data/questions.json')
      .then(r => {
        if (!r.ok) throw new Error('questions.json not found');
        return r.json();
      })
      .then(data => {
        questionsData = data;
        prepareLockedQuestions();
        renderAllQuestionText3D();
      })
      .catch(err => {
        console.error('[Part2] Failed to load questions.json:', err);
        noticeBox.textContent = '⚠️ Cannot load questions.json. Please check assets/data/questions.json';
        noticeBox.style.display = 'block';
      });

    scene.addEventListener('loaded', () => {
      sceneLoaded = true;
      attachTargetEvents();
    });

    scene.addEventListener('arReady', () => {
      loadingOverlay.classList.add('hidden');
      scanHint.classList.remove('hidden');
      arStatus.textContent = 'SCANNING';
      arStatus.className = 'ar-status scanning';
    });

    scene.addEventListener('arError', err => {
      console.error('[Part2] AR Error:', err);
      loadingText.textContent = 'Camera error. Please allow camera access.';
      noticeBox.style.display = 'block';
    });

    startBtn.addEventListener('click', startAR);

    function startAR() {
      if (arStarted) return;
      arStarted = true;

      startScreen.classList.add('hidden');
      loadingOverlay.classList.remove('hidden');
      loadingText.textContent = 'Loading AR engine…';
      arStatus.textContent = 'LOADING';

      const tryStart = () => {
        const sys = scene.systems && scene.systems['mindar-image-system'];
        if (!sceneLoaded || !sys) {
          setTimeout(tryStart, 120);
          return;
        }

        sys.start().catch(err => {
          console.error('[Part2] Failed to start AR:', err);
          loadingText.textContent = 'Cannot start camera. Please allow camera access.';
          noticeBox.style.display = 'block';
        });
      };

      tryStart();
    }

    function attachTargetEvents() {
      for (let i = 0; i < 10; i++) {
        const entity = document.getElementById(`target-${i}`);
        if (!entity) continue;

        entity.addEventListener('targetFound', () => showTrackedQuestion(i));
        entity.addEventListener('targetLost', () => hideTrackedQuestionWithDelay(i));
      }
    }

    function prepareLockedQuestions() {
      questionsData.forEach(item => {
        if (!item.questions || !item.questions.length) return;
        const randomIndex = Math.floor(Math.random() * item.questions.length);
        lockedQuestions[item.targetIndex] = item.questions[randomIndex];
      });
    }

    function renderAllQuestionText3D() {
      questionsData.forEach(item => {
        const question = lockedQuestions[item.targetIndex];
        if (!question) return;
        renderQuestionText3D(item.targetIndex, question);
      });
    }

    function showTrackedQuestion(targetIndex) {
      if (hideTimers[targetIndex]) {
        clearTimeout(hideTimers[targetIndex]);
        hideTimers[targetIndex] = null;
      }

      const data = questionsData.find(d => d.targetIndex === targetIndex);
      if (!data) return;

      const question = lockedQuestions[targetIndex];
      if (!question) return;

      currentTarget = {
        targetIndex,
        target: data.target,
        question
      };

      document.getElementById('popup-target-name').textContent = data.target;

      arPopup.classList.add('show');
      scanHint.classList.add('hidden');

      arStatus.textContent = 'FOUND';
      arStatus.className = 'ar-status found';

      // Auto-read only once per target to avoid repeated speech from tracking flicker.
      if (!spokenTargets[targetIndex]) {
        spokenTargets[targetIndex] = true;
        speakQuestion();
      }

      if ('vibrate' in navigator) navigator.vibrate(45);
    }

    function hideTrackedQuestionWithDelay(targetIndex) {
      hideTimers[targetIndex] = setTimeout(() => {
        if (currentTarget && currentTarget.targetIndex === targetIndex) {
          currentTarget = null;
          arPopup.classList.remove('show');
          scanHint.classList.remove('hidden');

          if (arStarted) {
            arStatus.textContent = 'SCANNING';
            arStatus.className = 'ar-status scanning';
          }

          if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        }
      }, 700);
    }

    // Split to exactly 1 or 2 lines.
    function makeTwoLines(text) {
      const clean = text.replace(/\s+/g, ' ').trim();
      const words = clean.split(' ');

      if (clean.length <= 20) return [clean];

      let best = null;

      for (let i = 1; i < words.length; i++) {
        const a = words.slice(0, i).join(' ');
        const b = words.slice(i).join(' ');
        const longest = Math.max(a.length, b.length);
        const balance = Math.abs(a.length - b.length);
        const score = longest * 3 + balance;

        if (!best || score < best.score) {
          best = { lines: [a, b], score };
        }
      }

      return best ? best.lines : [clean];
    }

    function getQuestionTextSize(lines) {
      const longest = Math.max(...lines.map(line => line.length));

      if (longest > 42) return 0.030;
      if (longest > 36) return 0.034;
      if (longest > 30) return 0.039;
      if (longest > 24) return 0.046;
      if (longest > 18) return 0.054;
      return 0.064;
    }

    function renderQuestionText3D(targetIndex, question) {
      const target = document.getElementById(`target-${targetIndex}`);
      if (!target) return;

      target.innerHTML = '';

      const lines = makeTwoLines(question);
      const size = getQuestionTextSize(lines);
      const lineGap = size * 1.9;

      const group = document.createElement('a-entity');
      group.setAttribute('position', '0 0.43 0.045');
      group.setAttribute('rotation', '-7 0 0');
      group.setAttribute('fit-3d-question', 'maxWidth: 1.05; maxHeight: 0.36;');

      lines.forEach((line, i) => {
        const y = lines.length === 1
          ? 0
          : (i === 0 ? lineGap / 2 : -lineGap / 2);

        const shadow = document.createElement('a-entity');
        shadow.setAttribute('center-3d-text', '');
        shadow.setAttribute('position', `0.010 ${y - 0.012} -0.024`);
        shadow.setAttribute('text-geometry', {
          value: line,
          font: '#font-bold',
          size,
          height: 0.015,
          curveSegments: 5,
          bevelEnabled: true,
          bevelSize: 0.0024,
          bevelThickness: 0.0024,
          bevelSegments: 1
        });
        shadow.setAttribute(
          'material',
          'shader: standard; color: #3a2a00; emissive: #171100; metalness: 0.04; roughness: 0.72; side: double; transparent: true; opacity: 0.88;'
        );

        const main = document.createElement('a-entity');
        main.setAttribute('center-3d-text', '');
        main.setAttribute('position', `0 ${y} 0`);
        main.setAttribute('text-geometry', {
          value: line,
          font: '#font-bold',
          size,
          height: 0.020,
          curveSegments: 6,
          bevelEnabled: true,
          bevelSize: 0.003,
          bevelThickness: 0.003,
          bevelSegments: 2
        });
        main.setAttribute(
          'material',
          'shader: standard; color: #ffd60a; emissive: #4b3a00; metalness: 0.08; roughness: 0.36; side: double;'
        );

        group.appendChild(shadow);
        group.appendChild(main);
      });

      target.appendChild(group);
    }

    function speakQuestion() {
      if (!currentTarget) return;
      speak(currentTarget.question);
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;

      window.speechSynthesis.cancel();

      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.88;
      utt.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const engVoice = voices.find(v => v.lang.startsWith('en') && v.localService);
      if (engVoice) utt.voice = engVoice;

      window.speechSynthesis.speak(utt);
    }

    if ('speechSynthesis' in window) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
  </script>
</body>
</html>
